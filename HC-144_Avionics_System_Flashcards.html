<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>HC-144 Avionics System Flashcards</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);min-height:100vh;padding:20px;}.container{max-width:700px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);padding:30px;}.header{text-align:center;margin-bottom:30px;border-bottom:2px solid #f0f0f0;padding-bottom:20px;}.header h1{font-size:28px;color:#333;margin-bottom:8px;}.header p{color:#666;font-size:14px;}.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:25px;overflow:hidden;}.progress-fill{height:100%;background:#378ADD;transition:width 0.3s;}.controls{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;justify-content:center;align-items:center;}.controls button{padding:10px 16px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;}.controls button:hover{background:#f5f5f5;}.controls button.active{background:#378ADD;color:white;border-color:#378ADD;}.card{background:white;border:2px solid #e0e0e0;border-radius:12px;padding:40px;min-height:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;margin-bottom:25px;transition:all 0.3s;}.card:hover{border-color:#378ADD;box-shadow:0 4px 12px rgba(55,138,221,0.15);}.card.flipped{background:#f9f9f9;border-color:#378ADD;}.card-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-weight:600;}.card-content{font-size:16px;font-weight:500;color:#333;text-align:center;line-height:1.8;}.card.flipped .card-content{font-size:15px;font-weight:400;}.navigation{display:flex;gap:12px;justify-content:center;}.navigation button{padding:12px 24px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:0.2s;}.navigation button:disabled{opacity:0.4;cursor:not-allowed;}.footer{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid #f0f0f0;font-size:12px;color:#999;}</style></head><body><div class="container"><div class="header"><h1>HC-144 Avionics System</h1><p>Red Book Emergency Procedures - 38 Cards</p></div><div class="progress-bar"><div class="progress-fill" id="progress"></div></div><div class="controls"><button class="active" id="allBtn" onclick="filterCards('all')">All</button><button id="sysBtn" onclick="filterCards('sys')">Systems</button><button id="failBtn" onclick="filterCards('fail')">Failures</button><button id="procBtn" onclick="filterCards('proc')">Procedures</button><span style="font-size:13px;color:#666;font-weight:500;"><span id="current">1</span>/<span id="total">38</span></span></div><div class="card" id="card" onclick="flipCard()"><div class="card-label" id="cardLabel">Question</div><div class="card-content" id="cardContent"></div></div><div class="navigation"><button onclick="previousCard()" id="prevBtn">← Previous</button><button onclick="nextCard()" id="nextBtn">Next →</button></div><div class="footer"><p>HC-144 Flight Manual (Red Book) - CGTO 1C-144B-1-CL1</p></div></div><script>const flashcards=[{category:'sys',question:'What is the Electronic Flight Display System (EFDS)?',answer:'Visual display of avionics data providing flight information on four 6x8 inch multicolor active matrix LCDs. Consists of four identical flat panel MFDs, two PFD control panels, two IHCs, two MFD power control panels, two display brightness control panels.'},{category:'sys',question:'What does the PFD display?',answer:'Primary Flight Display shows ADI (Attitude Director Indicator), HSI (Horizontal Situation Indicator), airspeed indicator, barometric altitude indicator, and vertical speed indicator.'},{category:'sys',question:'What is the IMFD used for?',answer:'Integrated Multifunction Display used as supplementary display for situational awareness information. Can revert to PFD format in event of PFD failure.'},{category:'sys',question:'What is the Air Data System (ADS) function?',answer:'Two ADCs compute IAS using dynamic/static pressure from pitot-static probes. Displays on linear moving tape with fixed pointer. Calculates VMO and VREF. Compares IAS/altitude between ADCs.'},{category:'sys',question:'Describe the pitot static system.',answer:'Three externally mounted pitot-static probes (L, R, AUX). L/R provide dynamic/static air to ADC1/ADC2. AUX provides pressure to IESI. Probe anti-icing via heating elements.'},{category:'sys',question:'What is the Attitude and Heading Reference System (AHRS)?',answer:'Two AHRS units using quartz-based inertial linear/angular sensors provide pitch, roll, heading angles. Receives heading info from magnetic field via FDU. Provides outputs to MMR, TCAS, EGPWS, EFIS, weather radar.'},{category:'sys',question:'What is the Embedded GPS/INU (EGI) system?',answer:'Laser gyro inertial reference unit with accelerometer and embedded GPS receiver (SPS civil, PPS military) with altitude aiding. Default attitude/heading source for EFIS. Used for navigation.'},{category:'sys',question:'What is the Flight Management System (FMS) function?',answer:'Processes data from multiple sources. Provides navigation guidance, flight planning, performance data. Controlled through CDUs. Default attitude/heading source is EGI.'},{category:'sys',question:'What navigation systems provide position/guidance data?',answer:'ADF (automatic direction finder), VHF Navigation (MMR - multimode receiver with VOR/ILS), DME (distance measuring equipment), TACAN, DF (direction finding), Weather Radar, Radio Altimeter, GPS via EGI.'},{category:'sys',question:'What is the Multimode Receiver (MMR)?',answer:'Embedded VOR, ILS, marker beacon, and SPS GPS receiver with RAIM/FDE, altitude aiding, WAAS. Provides VOR/ILS deviation to HSI and autopilot. Controlled through CDU.'},{category:'fail',question:'What indicates Air Reference Panel (ARP) failure?',answer:'Loss of display/control of PFD altimeter setting, altitude select bug, IAS bug, VS bug, V-speed bugs. Controlled by air reference panel rheostats for altitude selector, IAS reference, VS reference.'},{category:'fail',question:'How is Airspeed Indication Failure indicated?',answer:'Red A/S alert, ADC alert, and/or loss of airspeed information on associated PFD. May be caused by blockage of pitot static tubes. Check all pitot heat systems on/functioning.'},{category:'fail',question:'What causes Airspeed Mismatch?',answer:'Yellow IAS mismatch symbol in both PFDs. May result from blockage of pitot static tubes. Confirm pitot heat systems on and functioning properly. ADCs compared continuously.'},{category:'fail',question:'What indicates Altitude Indication Failure?',answer:'Red ALT alert and/or loss of altitude information on associated PFD. Caused by blockage of pitot static tubes. Confirm all pitot heat systems on and functioning.'},{category:'fail',question:'What indicates Altitude Mismatch?',answer:'Yellow ALT mismatch symbol in both PFDs. Caused by blockage of pitot static tubes. Determine valid ADC by comparing airspeed indications on PFDs and IESI.'},{category:'fail',question:'What indicates Attitude Indication Failure?',answer:'Red ATT alert, AHRS alert, and/or loss of aircraft attitude display. If attitude and heading fail simultaneously, perform EGI FAILURE procedure. Yellow AHC flag shows shared source.'},{category:'fail',question:'What causes Heading Indication Failure?',answer:'Red HDG alert and/or loss of heading information on associated PFD. AHRS failure or EGI failure may cause heading failure. Loss of attitude/heading signals.'},{category:'fail',question:'What indicates Heading Mismatch?',answer:'Heading information from two AHRS computers not within tolerances. Yellow HDG mismatch annunciator on both PFDs. Both sources compared continuously for agreement.'},{category:'fail',question:'What indicates EGI Failure?',answer:'Loss of attitude and heading accompanied by navigation source failure. Persistent CHECK PILOT/COPILOT GPS message on CDU. NGO indications on NAV STATUS page.'},{category:'fail',question:'What is Dual FMS Failure?',answer:'Both FMS 1 and FMS 2 navigation sources failed. Caused by EGI/MMR failures or loss of satellite reception. Loss of attitude/heading, NGO indications, CHECK PILOT GPS messages.'},{category:'fail',question:'What indicates MFD Failure?',answer:'Degraded or complete loss of graphics in PFD or IMFD. If PFD fails, turning it off causes IMFD to automatically swap to PFD format. Yellow MFD flag displayed.'},{category:'fail',question:'What is PFD Control Panel Failure?',answer:'Inability to change NAV source, HSI mode, or PFD data display. Operable control panel used for navigation remainder of flight. DCP flag displayed on affected PFD.'},{category:'proc',question:'What is the action for Air Reference Panel Failure?',answer:'Press AIR DATA pushbutton (affected side) to select offside ADC. Yellow ADC flag displayed on both PFDs indicating same ADC used. Operable side air reference panel controls all PFD settings.'},{category:'proc',question:'What is the action for Airspeed Indication Failure?',answer:'Press AIR DATA pushbutton (affected side) to select offside ADC. Yellow ADC flag displayed. Operable air reference panel controls all settings. Land as soon as practical.'},{category:'proc',question:'What is the action for Airspeed Mismatch?',answer:'Identify valid air data source by comparing PFD/IESI indications. Press AIR DATA pushbutton to select offside ADC. Yellow ADC flag displayed. Land as soon as practical.'},{category:'proc',question:'What is the action for Altitude Indication Failure?',answer:'Press AIR DATA pushbutton (affected side) to select offside ADC. Yellow ADC flag displayed. Operable air reference panel controls all settings. Land as soon as practical.'},{category:'proc',question:'What is the action for Altitude Mismatch?',answer:'Identify valid air data source comparing indications. Press AIR DATA pushbutton to select offside ADC. Operable side controls altitude settings for both PFDs. Land as soon as practical.'},{category:'proc',question:'What is the action for Attitude Indication Failure?',answer:'Press ATT/HDG pushbutton (affected side) to select valid attitude source: onside AHC if valid, otherwise offside AHC or EGI. Transfer controls to pilot with valid indication if unrestored.'},{category:'proc',question:'What is the action for Heading Indication Failure?',answer:'Press ATT/HDG pushbutton to select valid heading source. Select onside AHC if valid, otherwise offside AHC or EGI. White/yellow AHC/EGI flags displayed indicating source selection.'},{category:'proc',question:'What is the action for Heading Mismatch?',answer:'Identify valid heading source by comparing indication on PFDs. Press ATT/HDG pushbutton to confirm valid source selection. Land as soon as practical if unresolved.'},{category:'proc',question:'What is the action for EGI Failure?',answer:'Press ATT/HDG pushbutton to select valid attitude source. On INDEX/RNAV RNP page, select CIV#GNSS navigation source. If MMR failed, use ADS-B selector to select valid MMR.'},{category:'proc',question:'What recovery actions for EGI Failure?',answer:'Turn EGI power switch OFF, pull EGI circuit breakers, reset circuit breakers, turn EGI power ON. Perform EGI AIR alignment (up to 15 minutes). If unrecovered, select INU#GPS navigation source.'},{category:'proc',question:'What is the action for MFD Failure?',answer:'Turn affected MFD power selector OFF then ON. If still degraded, check if both same-side displays in PFD mode. If IMFD failed, turn OFF/ON. If PFD failed, turn OFF for IMFD to swap to PFD.'},{category:'proc',question:'What is the action for PFD Control Panel Failure?',answer:'Transfer flight controls to pilot with operable control panel if necessary. Operable PFD control panel used for navigation remainder of flight. Continue flight with functional controls.'},{category:'sys',question:'What do PFD control panels control?',answer:'Select data displayed on PFD. Manage ADI/HSI functions and formats. Select sources for air data, attitude/heading, navigation. Configure weather radar, TCAS, terrain overlays.'},{category:'sys',question:'What does air reference panel control?',answer:'Controls brightness of PFD indicators. IAS reference knob sets magenta bug. VS reference knob changes VS reference. BARO selector sets pressure units. Barometric pressure correction knob. Preselected altitude selector.'},{category:'sys',question:'What indicates ADC comparison failure?',answer:'Yellow IAS or ALT mismatch annunciators below respective linear tapes. Double-sided arrows indicate mismatch. ADC failure flag displayed in upper left corner of PFD if single ADC fails.'},{category:'fail',question:'What PFD alerts relate to avionics?',answer:'ADC (Air Data Computer failure), ADF (ADF failure), AHRS (heading/attitude reference failure), ALT (altitude failure), ATT (attitude failure), DCP (display control panel failure), FMS (FMS 1/2 failure), TCAS (TCAS failure).'},{category:'proc',question:'What critical CAUTION applies to Dual FMS Failure?',answer:'If operable GPS navigation solution not selected, TCAS TA/RA and Mode S/Mode 5/ADS-B Out altitude reporting will be lost. Must maintain valid GPS/AHC for traffic/altitude reporting.'}];let currentIndex=0,filteredCards=[...flashcards],isFlipped=false;function displayCard(){isFlipped=false;const card=filteredCards[currentIndex];document.getElementById('cardLabel').textContent='Question';document.getElementById('cardContent').textContent=card.question;document.getElementById('card').classList.remove('flipped');document.getElementById('current').textContent=currentIndex+1;document.getElementById('total').textContent=filteredCards.length;updateProgress();updateButtons();}function flipCard(){if(isFlipped)displayCard();else{isFlipped=true;document.getElementById('cardLabel').textContent='Answer';document.getElementById('cardContent').textContent=filteredCards[currentIndex].answer;document.getElementById('card').classList.add('flipped');}}function nextCard(){if(currentIndex<filteredCards.length-1){currentIndex++;displayCard();}}function previousCard(){if(currentIndex>0){currentIndex--;displayCard();}}function filterCards(category){document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));if(category==='all'){filteredCards=[...flashcards];document.getElementById('allBtn').classList.add('active');}else if(category==='sys'){filteredCards=flashcards.filter(c=>c.category==='sys');document.getElementById('sysBtn').classList.add('active');}else if(category==='fail'){filteredCards=flashcards.filter(c=>c.category==='fail');document.getElementById('failBtn').classList.add('active');}else if(category==='proc'){filteredCards=flashcards.filter(c=>c.category==='proc');document.getElementById('procBtn').classList.add('active');}currentIndex=0;displayCard();}function updateProgress(){document.getElementById('progress').style.width=((currentIndex+1)/filteredCards.length)*100+'%';}function updateButtons(){document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').disabled=currentIndex===filteredCards.length-1;}displayCard();</script></body></html>
