<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>HC-144 EGPWS Flashcards</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);min-height:100vh;padding:20px;}.container{max-width:700px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);padding:30px;}.header{text-align:center;margin-bottom:30px;border-bottom:2px solid #f0f0f0;padding-bottom:20px;}.header h1{font-size:28px;color:#333;margin-bottom:8px;}.header p{color:#666;font-size:14px;}.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:25px;overflow:hidden;}.progress-fill{height:100%;background:#378ADD;transition:width 0.3s;}.controls{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;justify-content:center;align-items:center;}.controls button{padding:10px 16px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;}.controls button:hover{background:#f5f5f5;}.controls button.active{background:#378ADD;color:white;border-color:#378ADD;}.card{background:white;border:2px solid #e0e0e0;border-radius:12px;padding:40px;min-height:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;margin-bottom:25px;transition:all 0.3s;}.card:hover{border-color:#378ADD;box-shadow:0 4px 12px rgba(55,138,221,0.15);}.card.flipped{background:#f9f9f9;border-color:#378ADD;}.card-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-weight:600;}.card-content{font-size:16px;font-weight:500;color:#333;text-align:center;line-height:1.8;}.card.flipped .card-content{font-size:15px;font-weight:400;}.navigation{display:flex;gap:12px;justify-content:center;}.navigation button{padding:12px 24px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:0.2s;}.navigation button:disabled{opacity:0.4;cursor:not-allowed;}.footer{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid #f0f0f0;font-size:12px;color:#999;}</style></head><body><div class="container"><div class="header"><h1>HC-144 EGPWS System</h1><p>Complete Flashcard Study Deck - 20 Cards</p></div><div class="progress-bar"><div class="progress-fill" id="progress"></div></div><div class="controls"><button class="active" id="allBtn" onclick="filterCards('all')">All</button><button id="modesBtn" onclick="filterCards('modes')">Modes</button><button id="featuresBtn" onclick="filterCards('features')">Features</button><button id="controlBtn" onclick="filterCards('control')">Controls</button><span style="font-size:13px;color:#666;font-weight:500;"><span id="current">1</span>/<span id="total">20</span></span></div><div class="card" id="card" onclick="flipCard()"><div class="card-label" id="cardLabel">Question</div><div class="card-content" id="cardContent"></div></div><div class="navigation"><button onclick="previousCard()" id="prevBtn">← Previous</button><button onclick="nextCard()" id="nextBtn">Next →</button></div><div class="footer"><p>HC-144 Flight Manual (Dash 1) - CGTO 1C-144B-1</p></div></div><script>const flashcards=[{category:'modes',question:'What is the primary function of EGPWS?',answer:'Enhanced Ground Proximity Warning System provides basic and enhanced terrain alerting and display features to prevent Controlled Flight Into Terrain (CFIT) accidents.'},{category:'modes',question:'What are the six EGPWS modes?',answer:'Mode 1: Excessive descent rate. Mode 2: Excessive closure to terrain. Mode 3: Altitude loss after takeoff. Mode 4: Unsafe terrain clearance. Mode 5: Excessive glideslope deviation. Mode 6: Advisory callouts.'},{category:'modes',question:'What is Mode 1 (Excessive Descent Rate) activation?',answer:'Activates yellow GPWS annunciation and "SINK RATE, SINK RATE" aural alert for excessive descent rates. Red PULL UP annunciation and "PULL UP" aural alert repeats continuously until warning envelope exited.'},{category:'modes',question:'What is Mode 2 (Excessive Closure to Terrain)?',answer:'Active during climbout, cruise, initial approach. Provides alerts for excessive closure rate to rising terrain. "TERRAIN, TERRAIN" caution or "PULL UP, PULL UP" warning aural alerts.'},{category:'modes',question:'What triggers Mode 3 (Altitude Loss After Takeoff)?',answer:'Activates for altitude loss after takeoff or low altitude go-around (below 245 ft AGL) with gear or flaps not in landing configuration. "DON\'T SINK, DON\'T SINK" aural alert.'},{category:'modes',question:'What is Mode 4 (Unsafe Terrain Clearance)?',answer:'Provides alerts for insufficient terrain clearance based on phase of flight, configuration, and speed. Exists in three forms: 4A (gear up), 4B (gear up, flaps not LNDG), 4C (takeoff phase).'},{category:'modes',question:'What is Mode 5 (Excessive Glideslope Deviation)?',answer:'Two levels: soft alert at 1.3 dots or greater below glideslope below 1,000 ft AGL ("GLIDESLOPE" at half volume). Hard alert at 2+ dots below glideslope below 300 ft AGL ("GLIDESLOPE, GLIDESLOPE" every 3 seconds).'},{category:'modes',question:'What advisory callouts does Mode 6 provide?',answer:'"MINIMUMS-MINIMUMS" at Decision Altitude, then "ONE THOUSAND", "FIVE HUNDRED", "ONE HUNDRED", "FIFTY", "FORTY", "THIRTY", "TWENTY", "TEN" feet. "BANK ANGLE, BANK ANGLE" if bank exceeds safe angle.'},{category:'features',question:'What are TAD and TCF functions?',answer:'TAD (Terrain and Obstacle Awareness Display): displays terrain/obstacles graphically. TCF (Terrain Clearance Floor): provides alerts for descent below defined terrain clearance floor. RFCF (Runway Field Clearance Floor) uses MSL altitude for runway-based protection.'},{category:'features',question:'What is Tactical Mode (TAC MODE)?',answer:'Alters EGPWS mode parameters to reduce nuisance alerts during operational profiles. Cannot engage with landing gear down. Terrain alerts at 170 ft AGL. "ALTITUDE ALTITUDE" replaces "MINIMUMS MINIMUMS".'},{category:'features',question:'What is RAAS function?',answer:'Runway Awareness and Advisory System provides aural messages during taxi, takeoff, approach, landing to reduce runway incursion risk. Routine advisories: approaching runway, on runway, distance remaining. Nonroutine: short runway, insufficient length, taxiway takeoff.'},{category:'features',question:'What data inputs does EGPWS require?',answer:'ADC (altitude, vertical speed, airspeed), AHRS (roll, heading), Radio altimeter (terrain altitude), EFIS (glideslope), Flap/gear microswitches, Stall warning, Terrain database, EGI (GPS), FMS position.'},{category:'control',question:'What inhibit pushtiles control EGPWS alerts?',answer:'ALL INHB: inhibits all aural alerts. TERR INHB: inhibits TAD/TCF alerting. G/S CNCL: inhibits Mode 5 glideslope alerts. FLAP OVRD: inhibits Mode 4 "TOO LOW FLAPS" alerts.'},{category:'control',question:'What is the EGPWS aural alert priority?',answer:'PULL UP (highest) → TERRAIN → OBSTACLE → MINIMUMS → CAUTION TERRAIN → TOO LOW TERRAIN → ALTITUDE CALLOUTS → SINK RATE → DON\'T SINK → GLIDESLOPE (lowest).'},{category:'control',question:'When should EGPWS test be performed?',answer:'Momentarily press TEST for short level 1 self-test. Press and hold for long level 1 self-test. TAC MODE light illuminates for ~2 seconds during test to indicate proper function.'},{category:'control',question:'What happens when EGPWS ALL INHB is activated?',answer:'All aural alerts inhibited. When activated for more than 60 seconds, GPWS inoperative and TERRAIN inoperative annunciations displayed on PFDs. Used if operationally required or after malfunctions to avoid nuisance alerts.'},{category:'control',question:'What does TERR INHB pushtile do?',answer:'Inhibits all aural and visual cautions/warnings of TAD and TCF functions. Terrain display removed from MFDs if selected. EGPWS reverts to basic GPWS Modes 1-6 protection with little advance warning for flight into steep terrain.'},{category:'control',question:'What is G/S CNCL pushtile function?',answer:'Inhibits "GLIDESLOPE, GLIDESLOPE" aural alert anytime after aircraft descended below 2,000 ft AGL on glideslope. Glideslope alerts rearm when aircraft below 30 ft or above 2,000 ft AGL.'},{category:'control',question:'What does FLAP OVRD pushtile accomplish?',answer:'Inhibits "TOO LOW FLAPS" aural alert when landing with flaps set to less than LNDG configuration. Should always be kept unpressed except when landing with flaps less than LNDG. Press out after landing or go-around.'},{category:'features',question:'What happens when stall warning and EGPWS alert occur simultaneously?',answer:'Stall warning has priority. If both systems issue alerts at same time, stall warning annunciation and aural alert take precedence over EGPWS alerts.'}];let currentIndex=0,filteredCards=[...flashcards],isFlipped=false;function displayCard(){isFlipped=false;const card=filteredCards[currentIndex];document.getElementById('cardLabel').textContent='Question';document.getElementById('cardContent').textContent=card.question;document.getElementById('card').classList.remove('flipped');document.getElementById('current').textContent=currentIndex+1;document.getElementById('total').textContent=filteredCards.length;updateProgress();updateButtons();}function flipCard(){if(isFlipped)displayCard();else{isFlipped=true;document.getElementById('cardLabel').textContent='Answer';document.getElementById('cardContent').textContent=filteredCards[currentIndex].answer;document.getElementById('card').classList.add('flipped');}}function nextCard(){if(currentIndex<filteredCards.length-1){currentIndex++;displayCard();}}function previousCard(){if(currentIndex>0){currentIndex--;displayCard();}}function filterCards(category){document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));if(category==='all'){filteredCards=[...flashcards];document.getElementById('allBtn').classList.add('active');}else if(category==='modes'){filteredCards=flashcards.filter(c=>c.category==='modes');document.getElementById('modesBtn').classList.add('active');}else if(category==='features'){filteredCards=flashcards.filter(c=>c.category==='features');document.getElementById('featuresBtn').classList.add('active');}else if(category==='control'){filteredCards=flashcards.filter(c=>c.category==='control');document.getElementById('controlBtn').classList.add('active');}currentIndex=0;displayCard();}function updateProgress(){document.getElementById('progress').style.width=((currentIndex+1)/filteredCards.length)*100+'%';}function updateButtons(){document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').disabled=currentIndex===filteredCards.length-1;}displayCard();</script></body></html>
