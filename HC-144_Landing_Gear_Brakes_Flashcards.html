<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"><title>HC-144 Landing Gear Flashcards</title><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; background: linear-gradient(135deg, #f5f5f5, #e8e8e8); min-height: 100vh; padding: 20px; } .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 30px; } .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px; } .header h1 { font-size: 28px; color: #333; margin-bottom: 8px; } .header p { color: #666; font-size: 14px; } .progress-bar { height: 4px; background: #f0f0f0; border-radius: 2px; margin-bottom: 25px; overflow: hidden; } .progress-fill { height: 100%; background: #378ADD; transition: width 0.3s; } .controls { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; align-items: center; } .controls button { padding: 10px 16px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; } .controls button:hover { background: #f5f5f5; } .controls button.active { background: #378ADD; color: white; border-color: #378ADD; } .card { background: white; border: 2px solid #e0e0e0; border-radius: 12px; padding: 40px; min-height: 340px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; margin-bottom: 25px; transition: all 0.3s; } .card:hover { border-color: #378ADD; box-shadow: 0 4px 12px rgba(55,138,221,0.15); } .card.flipped { background: #f9f9f9; border-color: #378ADD; } .card-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; font-weight: 600; } .card-content { font-size: 16px; font-weight: 500; color: #333; text-align: center; line-height: 1.8; } .card.flipped .card-content { font-size: 15px; font-weight: 400; } .navigation { display: flex; gap: 12px; justify-content: center; } .navigation button { padding: 12px 24px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; } .navigation button:disabled { opacity: 0.4; cursor: not-allowed; }</style></head><body><div class="container"><div class="header"><h1>HC-144 Landing Gear & Brakes</h1><p>Complete Flashcard Study Deck - 38 Cards</p></div><div class="progress-bar"><div class="progress-fill" id="progress"></div></div><div class="controls"><button class="active" id="allBtn" onclick="filterCards('all')">All</button><button id="gearBtn" onclick="filterCards('gear')">Landing Gear</button><button id="brakeBtn" onclick="filterCards('brake')">Brakes</button><button id="steerBtn" onclick="filterCards('steer')">Steering</button><span style="font-size:13px;color:#666;font-weight:500;"><span id="current">1</span>/<span id="total">38</span></span></div><div class="card" id="card" onclick="flipCard()"><div class="card-label" id="cardLabel">Question</div><div class="card-content" id="cardContent"></div></div><div class="navigation"><button onclick="previousCard()" id="prevBtn">← Previous</button><button onclick="nextCard()" id="nextBtn">Next →</button></div></div><script>const flashcards=[{category:'gear',question:'What are the three landing gear assemblies?',answer:'Nose Landing Gear (NLG) and two Main Landing Gear (MLG) assemblies. All have shock absorbers and oleos.'},{category:'gear',question:'What are the gear positions?',answer:'UP (retracted), DOWN (extended and locked), and TRANSIT (moving between positions). Position indicated on IEDS and by gear position lights.'},{category:'gear',question:'What is the normal gear extension procedure?',answer:'Select landing gear lever DOWN. Hydraulic pressure actuates main gear cylinders, oleos extend against aerodynamic pressure, nose gear extends normally.'},{category:'gear',question:'What triggers the gear warning horn?',answer:'Landing Gear Unsafe warning when one or more gear not fully up or down during certain flight conditions. Horns also sound for unsafe takeoff configuration.'},{category:'gear',question:'How many landing gear position microswitch locks secure each main gear?',answer:'Two microswitch locks on each main gear: main lock and secondary lock. Both must be made for gear down and locked condition.'},{category:'gear',question:'What is the purpose of the landing gear doors?',answer:'Aerodynamic covers that close during gear retraction to reduce drag. Open when gear extends. Prevent debris from entering wheel well.'},{category:'brake',question:'How is normal braking accomplished on HC-144?',answer:'By pressing pilot or copilot pedals. Braking is differential and proportional to deflection of corresponding pedal. Hydraulically actuated brake packs.'},{category:'brake',question:'What are the brake pack components?',answer:'Each main wheel has disc brake pack with hydraulically actuated pistons. Two wheel discs rotate with wheel, pressed between three axle discs.'},{category:'brake',question:'How many pistons actuate each disc brake pack?',answer:'Five hydraulic pistons per brake pack. When pressure applied, wheel discs pressed between axle discs. Recovery springs separate discs when pressure released.'},{category:'brake',question:'What is the brake accumulator function?',answer:'Stores pressure to allow six full brake applications in event of hydraulic system failure. Must have at least 3,000 psi for full braking ability.'},{category:'brake',question:'What is the antiskid system function?',answer:'Prevents wheel locking and skidding during braking. Monitors wheel speed via transducers and modulates hydraulic pressure proportionally to maintain maximum braking without skid.'},{category:'brake',question:'What is ANTI-SKID NON-OP selection for?',answer:'Used when antiskid is inoperative to provide accurate landing distance calculations in flight planning. Accounts for reduced braking effectiveness.'},{category:'brake',question:'How is emergency braking accomplished if normal system fails?',answer:'Independent emergency braking hydraulic circuit applies braking simultaneously to all four MLG wheels. No antiskid protection available.'},{category:'brake',question:'What does brake pad wear indicator show?',answer:'Pin protruding from hydraulic piston block displays condition of friction pads. Pin length decreases as pads wear, determined with brakes applied.'},{category:'brake',question:'What is the brake temperature indicator function?',answer:'Shows highest temperature in MAX or selected brake pack temperature on pilot console. Red OVHT light illuminates if brake pack exceeds max allowable temperature.'},{category:'steer',question:'What is nosewheel steering system function?',answer:'Allows aircraft directional control on ground using hydraulic-powered steering actuator. Activated when nose gear shock absorber compressed and WHL STEER pushtile pressed.'},{category:'steer',question:'What are the nosewheel steering control conditions?',answer:'WHL STEER pushtile must be pressed (OFF light extinguished), NLG main and inner body must be engaged (tow pin removed), nose gear shock must be compressed.'},{category:'steer',question:'What is the purpose of the WHL STEER pushtile visual indicator bar?',answer:'Illuminated when passage of hydraulic pressure to control valve is allowed. Indicates hydraulic control valve activation.'},{category:'steer',question:'How is the nosewheel disconnected for towing?',answer:'Tow pin engaged (down position) disconnects nosewheel from main body, allowing free rotation for towing operations.'},{category:'steer',question:'What does RAMP CYL magnetic indicator show?',answer:'Amber illumination = both ramp cylinder locks are locked. Ramp can only open to horizontal position. OFF = unlocked.'},{category:'gear',question:'What triggers emergency landing gear extension?',answer:'When landing gear unsafe indication persists despite normal procedures, or if hydraulic system failure prevents normal extension. Manual emergency extension system activated.'},{category:'gear',question:'What is the manual emergency landing gear extension system?',answer:'Mechanical bleed-down system allowing free fall extension of landing gear using gravity and aerodynamic pressure. Deployed when hydraulic extension unavailable.'},{category:'gear',question:'Why is landing gear position confirmation critical before touchdown?',answer:'Unsafe landing gear can cause gear collapse, crash landing, and loss of aircraft. Must verify down and locked via IEDS indicators and green gear lights.'},{category:'brake',question:'What is the minimum landing distance consideration?',answer:'With reduced braking availability (less than 3,000 psi in accumulators), must use longer landing distance. Plan for forced landing if accumulator pressure insufficient.'},{category:'brake',question:'What speed should be maintained during emergency brake operations?',answer:'Maintain safe landing speed. Apply steady braking without skidding tires or depleting accumulator pressure. Turns should be gradual to avoid skids.'},{category:'gear',question:'What is the gear extension sequence for normal landing?',answer:'Select landing gear DOWN lever. Verify green down and locked lights illuminate on all three gear. Confirm IEDS indication shows DOWN. Complete before landing.'},{category:'brake',question:'When should antiskid system be OFF during landing?',answer:'After hydraulic loss scenario, turn ANTISKID OFF to prevent rapid drop in brake accumulator pressure. Apply steady braking with ANTISKID OFF.'},{category:'steer',question:'What is the maximum nosewheel steering deflection?',answer:'Nosewheel steering provides differential directional control on ground. Steering function only available with nose gear extension and weight on wheels.'},{category:'gear',question:'How long does gear extension normally take?',answer:'Gear extends within normal time period with proper hydraulic pressure. If extension takes excessive time or fails, suspect system blockage or pump failure.'},{category:'brake',question:'What is the purpose of applying brakes during taxi?',answer:'Normal taxi braking provides directional control and speed reduction. Gentle pedal deflection proportionally applies hydraulic pressure for smooth control.'},{category:'gear',question:'What electrical indicator confirms landing gear position?',answer:'IEDS display shows landing gear position (UP or DOWN). Three green lights on gear panel indicate each gear down and locked. Red light indicates unsafe.'},{category:'brake',question:'What preparation is needed before flight regarding brake temperature?',answer:'Check brake temperature indicator is in green range at beginning of flight. If high, allow brakes to cool before flight. Monitor during descent.'},{category:'gear',question:'Can nosewheel steering be used at high taxi speeds?',answer:'Nosewheel steering designed for low-speed directional control. At higher speeds, use differential braking and engine thrust for directional control.'},{category:'brake',question:'What does brake pressure accumulator low condition require?',answer:'Land immediately - braking ability severely limited. Six maximum brake applications only available. Do not delay landing once condition detected.'},{category:'steer',question:'What prevents unintended nosewheel steering activation?',answer:'Multiple conditions must be met simultaneously: nose gear extension, weight on nose gear, WHL STEER pushtile pressed, AND tow pin removed.'},{category:'gear',question:'What is the critical gear safety check before flight?',answer:'Verify all gear indicators green (down and locked), cross-check IEDS display, and confirm landing gear position lights before takeoff clearance.'},{category:'brake',question:'How should crosswind landing affect brake planning?',answer:'With crosswind landing, maintain directional control with rudder and differential braking. Antiskid system automatically manages wheel slip during crosswind braking.'},{category:'gear',question:'What happens if gear fails to extend during descent?',answer:'Use manual emergency extension system - mechanical free-fall extension using gravity and aerodynamic pressure. Land as soon as possible.'},{category:'steer',question:'Is nosewheel steering operational during main gear retraction?',answer:'Nosewheel steering functionality depends on nose gear shock compression and extension status. Not available during gear retraction or when nose gear compressed without weight.'},{category:'brake',question:'What is the relationship between flap setting and landing distance?',answer:'Full landing flaps (23°) provide maximum descent rate and aerodynamic braking. Combined with proper braking, achieves shortest landing distance safely.'}];let currentIndex=0,filteredCards=[...flashcards],isFlipped=false;function displayCard(){isFlipped=false;const card=filteredCards[currentIndex];document.getElementById('cardLabel').textContent='Question';document.getElementById('cardContent').textContent=card.question;document.getElementById('card').classList.remove('flipped');document.getElementById('current').textContent=currentIndex+1;document.getElementById('total').textContent=filteredCards.length;updateProgress();updateButtons();}function flipCard(){if(isFlipped)displayCard();else{isFlipped=true;document.getElementById('cardLabel').textContent='Answer';document.getElementById('cardContent').textContent=filteredCards[currentIndex].answer;document.getElementById('card').classList.add('flipped');}}function nextCard(){if(currentIndex<filteredCards.length-1){currentIndex++;displayCard();}}function previousCard(){if(currentIndex>0){currentIndex--;displayCard();}}function filterCards(category){document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));if(category==='all'){filteredCards=[...flashcards];document.getElementById('allBtn').classList.add('active');}else if(category==='gear'){filteredCards=flashcards.filter(c=>c.category==='gear');document.getElementById('gearBtn').classList.add('active');}else if(category==='brake'){filteredCards=flashcards.filter(c=>c.category==='brake');document.getElementById('brakeBtn').classList.add('active');}else if(category==='steer'){filteredCards=flashcards.filter(c=>c.category==='steer');document.getElementById('steerBtn').classList.add('active');}currentIndex=0;displayCard();}function updateProgress(){document.getElementById('progress').style.width=((currentIndex+1)/filteredCards.length)*100+'%';}function updateButtons(){document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').disabled=currentIndex===filteredCards.length-1;}displayCard();</script></body></html>
