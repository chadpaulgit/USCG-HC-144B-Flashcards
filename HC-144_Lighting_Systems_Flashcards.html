<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>HC-144 Lighting Systems Flashcards</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);min-height:100vh;padding:20px;}.container{max-width:700px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);padding:30px;}.header{text-align:center;margin-bottom:30px;border-bottom:2px solid #f0f0f0;padding-bottom:20px;}.header h1{font-size:28px;color:#333;margin-bottom:8px;}.header p{color:#666;font-size:14px;}.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:25px;overflow:hidden;}.progress-fill{height:100%;background:#378ADD;transition:width 0.3s;}.controls{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;justify-content:center;align-items:center;}.controls button{padding:10px 16px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;}.controls button:hover{background:#f5f5f5;}.controls button.active{background:#378ADD;color:white;border-color:#378ADD;}.card{background:white;border:2px solid #e0e0e0;border-radius:12px;padding:40px;min-height:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;margin-bottom:25px;transition:all 0.3s;}.card:hover{border-color:#378ADD;box-shadow:0 4px 12px rgba(55,138,221,0.15);}.card.flipped{background:#f9f9f9;border-color:#378ADD;}.card-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-weight:600;}.card-content{font-size:16px;font-weight:500;color:#333;text-align:center;line-height:1.8;}.card.flipped .card-content{font-size:15px;font-weight:400;}.navigation{display:flex;gap:12px;justify-content:center;}.navigation button{padding:12px 24px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:0.2s;}.navigation button:disabled{opacity:0.4;cursor:not-allowed;}.footer{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid #f0f0f0;font-size:12px;color:#999;}</style></head><body><div class="container"><div class="header"><h1>HC-144 Lighting Systems</h1><p>Complete Flashcard Study Deck - 30 Cards</p></div><div class="progress-bar"><div class="progress-fill" id="progress"></div></div><div class="controls"><button class="active" id="allBtn" onclick="filterCards('all')">All</button><button id="extBtn" onclick="filterCards('ext')">External</button><button id="cockBtn" onclick="filterCards('cock')">Cockpit</button><button id="cabinBtn" onclick="filterCards('cabin')">Cabin</button><button id="nvgBtn" onclick="filterCards('nvg')">NVG Mode</button><span style="font-size:13px;color:#666;font-weight:500;"><span id="current">1</span>/<span id="total">30</span></span></div><div class="card" id="card" onclick="flipCard()"><div class="card-label" id="cardLabel">Question</div><div class="card-content" id="cardContent"></div></div><div class="navigation"><button onclick="previousCard()" id="prevBtn">← Previous</button><button onclick="nextCard()" id="nextBtn">Next →</button></div><div class="footer"><p>HC-144 Flight Manual (Dash 1) - CGTO 1C-144B-1</p></div></div><script>const flashcards=[{category:'ext',question:'What are the main external lighting categories?',answer:'Landing lights, Taxi lights, Runway turnoff lights, Navigation lights, Anticollision lights, Wing inspection lights, Logo lights, External flood lights.'},{category:'ext',question:'Where are landing lights installed and how are they controlled?',answer:'Installed in lower forward portion of each main landing gear fairing. Controlled by LANDING (L, R) switches on cockpit overhead EXT LT panel. Pulse mode energizes alternately side-to-side.'},{category:'ext',question:'What is taxi light function and availability?',answer:'Installed in EO/IR turret fairing. Microswitch allows illumination only when nose gear not up and locked. Unavailable in NVG mode.'},{category:'ext',question:'What do runway turnoff lights illuminate?',answer:'Installed on forward side of each MLG fairing. Supply illumination to side and front of aircraft to help identify runway turnoff areas during night taxiing. Unavailable in NVG mode.'},{category:'ext',question:'Describe navigation light configuration.',answer:'Green lights on RH wing tip (2), Red lights on LH wing tip (2), White and green lights at tail cone (2+2). IR position lights on top of each wing tip. Can operate in IR, NVIS friendly, or normal mode.'},{category:'ext',question:'What is purpose of NAV BRT/OFF/DIM selector?',answer:'Controls brightness of visible navigation lights in normal mode. BRT: fully illuminated. DIM: dimmed mode. In NVG mode, visible lights extinguish and IR/NVIS friendly lights illuminate.'},{category:'ext',question:'What does NAV COVERT switch do?',answer:'Functional only in NVG MODE. ON: extinguishes all visible lights including red anticollision lights; only IR nav lights and upper anticollision infrared LED ring energized. OFF: returns to NVG MODE configuration.'},{category:'ext',question:'Describe anticollision light system.',answer:'Two LED-type dual-mode lights: lower on fuselage (white/red visible), upper on vertical stabilizer (white/red visible + IR LED ring). Flash 40-100 cycles/minute. Red mode reduces NVG blooming; white mode better visibility. White mode used in terminal environment.'},{category:'ext',question:'What is wing inspection light function?',answer:'Installed on each side of fuselage. Illuminate wing leading edges, engine intakes, propellers. Detect ice formation during night flights and improve visibility during ground servicing. Controlled by WG INSP switch. Unavailable in NVG mode.'},{category:'ext',question:'What is logo light function?',answer:'Two lights installed on upper surface of horizontal stabilizer (one each side of vertical stabilizer). Illuminate vertical stabilizer. Controlled by LOGO switch on overhead EXT LT panel. Unavailable in NVG mode.'},{category:'ext',question:'Can landing lights be independently controlled?',answer:'YES - Left and right landing lights controlled separately by LANDING L and LANDING R switches. Each can be on or off independently. Must be OFF for LANDING PULSE mode to function.'},{category:'ext',question:'What is anticollision light flash rate?',answer:'Stroboscopic LED lights flash at frequency between 40 and 100 cycles per minute. Rate is automatic; no manual adjustment available.'},{category:'cock',question:'What cockpit lighting systems exist?',answer:'Upper panel FWD/RWD backlighting, Central panel instrument backlighting, Central pedestal backlighting, Dome lights (overhead), Instrument panel backlighting, Map lights, Pedal/floor lights, Reading lights, Panel lights.'},{category:'cock',question:'How is cockpit lighting controlled?',answer:'Rheostats control brightness of overhead panel backlighting, instrument panel, pedestal, and individual console areas. Toggle switches activate dome, map, reading, pedal/floor, and panel lights independently.'},{category:'cock',question:'What cockpit utility lights are installed?',answer:'Two cockpit utility lights (white/red) with clip base and control knob on pilot and copilot consoles. Two map lights (green/NVIS green) above map holder on center yokes. Foot lights below pedals. Panel lights below glareshield.'},{category:'cabin',question:'What is cabin illumination provided by?',answer:'Two rows of white/green and white/IR lights (14 white, 7 green, 7 IR each row), plus two entrance dome lights (one at crew door, one at main cabin door). Can be controlled from cockpit or rear attendant panel.'},{category:'cabin',question:'How is cabin lighting controlled and why?',answer:'CABIN CTL ATTENDANT/PLT switch selects control location. From cockpit via INTERNAL LT panel or from rear attendant panel. Separate crew door dome light controlled by ENTRANCE pushtile (cockpit or forward attendant). Main cabin door controlled by rear attendant panel.'},{category:'cabin',question:'What cabin lighting modes exist?',answer:'WHITE: illuminates white cabin lights. OFF: extinguishes all cabin lights. GREEN: illuminates green cabin lights. CABIN lights DIM/BRT rheostat controls brightness. Lights available in normal mode and some in NVG mode.'},{category:'cabin',question:'What is cargo area lighting?',answer:'Interior flood light above cargo door, external flood light in lower rear tail cone behind cargo door. Controlled by CARGO LIGHTS INT/EXT pushtiles. Unavailable in NVG MODE. Spotlight can be adjusted.'},{category:'cabin',question:'What are jump light indicators?',answer:'Green and red visual annunciators installed in ramp area. Two bells in main compartment for paratroop operations. Controlled by pushtiles on AERIAL DLVY control panels. Operate in NVG mode.'},{category:'cabin',question:'What is LANDING PULSE switch function?',answer:'When ON, landing lights energize alternately from side to side. LANDING (L, R) switches must be OFF for pulse mode to function. Unavailable in NVG mode.'},{category:'cabin',question:'What crew rest area lighting exists?',answer:'Four reading lights (one at each crew rest seat). Each operated independently. Light can be moved to adjust beam direction. Portable light with base clip at each observer station.'},{category:'cabin',question:'What passenger warning signs exist?',answer:'FASTEN SEAT BELTS and NO SMOKING signs. SEAT BELTS/NO SMOKE pushtiles on cockpit overhead INTERNAL LT panel illuminate respective signs in cabin and sound tone on cabin PA.'},{category:'cabin',question:'What is lavatory lighting control?',answer:'Toilet light in overhead of lavatory compartment controlled by TOILET pushtile on forward ATTENDANT CONTROL panel. Unavailable in NVG mode.'},{category:'nvg',question:'What is NVG MODE pushtile function?',answer:'Pressed to activate NVG MODE. Extinguishes taxi, runway turnoff, wing inspection, logo, and visible landing lights. Red anticollision light, IR navigation lights, upper anticollision IR LED ring illuminate. NVIS-friendly nav lights illuminate if NAV selector BRT/DIM.'},{category:'nvg',question:'When are visible landing lights extinguished?',answer:'When NVG MODE is selected, visible landing lights extinguish and infrared landing lights are enabled for night vision goggle compatibility.'},{category:'nvg',question:'What are the two entrance dome lights controlled by?',answer:'Crew door dome light: ENTRANCE pushtile on overhead panel OR ENTR pushtile on forward attendant control panel. Main cabin door dome light: ENTRANCE pushtile on rear attendant control panel only.'},{category:'nvg',question:'What determines lighting availability in NVG mode?',answer:'In NVG MODE: available - NVG-compatible lights (IR nav, IR landing, red anticollision, upper anticollision IR LED, jump lights). Unavailable - taxi, runway turnoff, wing inspection, logo, visible landing, lavatory, cargo exterior lights.'},{category:'nvg',question:'How many navigation light colors exist and where?',answer:'Red: 2 on LH wing tip. Green: 2 on RH wing tip. White: 2 at tail. Green: 2 at tail. Total 8 visible navigation lights plus IR position lights on wing tops.'},{category:'ext',question:'What is the purpose of static dischargers?',answer:'27 static dischargers installed at outer and upper trailing edges of wings and tail surfaces. Reduce static electricity interference noise in electronic equipment.'},{category:'nvg',question:'What NVG compatibility features exist?',answer:'NAV MODE pushtile, IR landing lights, IR navigation lights, upper anticollision IR LED ring, NVIS-friendly navigation lights, red anticollision capability, jump lights operational in NVG mode.'}];let currentIndex=0,filteredCards=[...flashcards],isFlipped=false;function displayCard(){isFlipped=false;const card=filteredCards[currentIndex];document.getElementById('cardLabel').textContent='Question';document.getElementById('cardContent').textContent=card.question;document.getElementById('card').classList.remove('flipped');document.getElementById('current').textContent=currentIndex+1;document.getElementById('total').textContent=filteredCards.length;updateProgress();updateButtons();}function flipCard(){if(isFlipped)displayCard();else{isFlipped=true;document.getElementById('cardLabel').textContent='Answer';document.getElementById('cardContent').textContent=filteredCards[currentIndex].answer;document.getElementById('card').classList.add('flipped');}}function nextCard(){if(currentIndex<filteredCards.length-1){currentIndex++;displayCard();}}function previousCard(){if(currentIndex>0){currentIndex--;displayCard();}}function filterCards(category){document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));if(category==='all'){filteredCards=[...flashcards];document.getElementById('allBtn').classList.add('active');}else if(category==='ext'){filteredCards=flashcards.filter(c=>c.category==='ext');document.getElementById('extBtn').classList.add('active');}else if(category==='cock'){filteredCards=flashcards.filter(c=>c.category==='cock');document.getElementById('cockBtn').classList.add('active');}else if(category==='cabin'){filteredCards=flashcards.filter(c=>c.category==='cabin');document.getElementById('cabinBtn').classList.add('active');}else if(category==='nvg'){filteredCards=flashcards.filter(c=>c.category==='nvg');document.getElementById('nvgBtn').classList.add('active');}currentIndex=0;displayCard();}function updateProgress(){document.getElementById('progress').style.width=((currentIndex+1)/filteredCards.length)*100+'%';}function updateButtons(){document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').disabled=currentIndex===filteredCards.length-1;}displayCard();</script></body></html>
