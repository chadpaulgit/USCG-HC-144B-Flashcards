<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>HC-144 PIC Duties & Responsibilities Flashcards</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);min-height:100vh;padding:20px;}.container{max-width:700px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);padding:30px;}.header{text-align:center;margin-bottom:30px;border-bottom:2px solid #f0f0f0;padding-bottom:20px;}.header h1{font-size:28px;color:#333;margin-bottom:8px;}.header p{color:#666;font-size:14px;}.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:25px;overflow:hidden;}.progress-fill{height:100%;background:#378ADD;transition:width 0.3s;}.controls{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;justify-content:center;align-items:center;}.controls button{padding:10px 16px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;}.controls button:hover{background:#f5f5f5;}.controls button.active{background:#378ADD;color:white;border-color:#378ADD;}.card{background:white;border:2px solid #e0e0e0;border-radius:12px;padding:40px;min-height:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;margin-bottom:25px;transition:all 0.3s;}.card:hover{border-color:#378ADD;box-shadow:0 4px 12px rgba(55,138,221,0.15);}.card.flipped{background:#f9f9f9;border-color:#378ADD;}.card-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-weight:600;}.card-content{font-size:16px;font-weight:500;color:#333;text-align:center;line-height:1.8;}.card.flipped .card-content{font-size:15px;font-weight:400;}.navigation{display:flex;gap:12px;justify-content:center;}.navigation button{padding:12px 24px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:0.2s;}.navigation button:disabled{opacity:0.4;cursor:not-allowed;}.footer{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid #f0f0f0;font-size:12px;color:#999;}</style></head><body><div class="container"><div class="header"><h1>HC-144 PIC Duties & Responsibilities</h1><p>Pilot in Command - 35 Cards</p></div><div class="progress-bar"><div class="progress-fill" id="progress"></div></div><div class="controls"><button class="active" id="allBtn" onclick="filterCards('all')">All</button><button id="prefBtn" onclick="filterCards('pref')">Preflight</button><button id="missionBtn" onclick="filterCards('mission')">Mission</button><button id="authBtn" onclick="filterCards('auth')">Authority</button><button id="crewBtn" onclick="filterCards('crew')">Crew</button><span style="font-size:13px;color:#666;font-weight:500;"><span id="current">1</span>/<span id="total">35</span></span></div><div class="card" id="card" onclick="flipCard()"><div class="card-label" id="cardLabel">Question</div><div class="card-content" id="cardContent"></div></div><div class="navigation"><button onclick="previousCard()" id="prevBtn">← Previous</button><button onclick="nextCard()" id="nextBtn">Next →</button></div><div class="footer"><p>COMDTINST M3710.1I & CGTO 1C-144B-1</p></div></div><script>const flashcards=[{category:'pref',question:'How is PIC defined?',answer:'Pilot assigned by proper authority to take charge of aircraft and be responsible for specific flight or mission. Accepts aircraft by signing Preflight Record. Responsibility from first entering aircraft until leaving upon mission completion.'},{category:'pref',question:'When is PIC assigned if not designated before flight?',answer:'Senior pilot holding Aircraft Commander (AC) or First Pilot (FP) designation, in that order. Omission of assignment does not nullify PIC status. Senior pilot assumes PIC role.'},{category:'pref',question:'Who is normally the PIC when multiple pilots assigned?',answer:'Pilot holding highest designation in type/model. If same designation, pilot with highest mission qualification. If same qualification, senior pilot. AC/FP required for specific missions.'},{category:'pref',question:'What happens if Instructor Pilot or Flight Examiner required?',answer:'IP or Flight Examiner required to manipulate/guard controls becomes PIC for primary mission. Higher priority than other crew members.'},{category:'pref',question:'What about Civilian Contract Pilot vs active duty pilot?',answer:'If CCP assigned with active duty pilot of same designation, active duty pilot shall be PIC.'},{category:'pref',question:'What is PIC Preflight Record responsibility?',answer:'PIC accepts aircraft by signing Preflight Record. Documents aircraft acceptance and responsibility assumption. Required documentation of PIC assumption.'},{category:'mission',question:'What are PIC core responsibilities?',answer:'Professional, safe, orderly, efficient, effective performance of aircraft, aircrew, passengers during entire mission. From entering aircraft until leaving upon completion.'},{category:'mission',question:'What is PIC authority scope?',answer:'Direct all aircraft and aircrew activities during mission including between sorties. Flight clearance authority. Authority to modify planned missions for crew/airframe safety.'},{category:'mission',question:'Why must crew know PIC identity and authority?',answer:'Mission completion or crew/aircraft safety jeopardized if crewmember unaware of PIC identity or fails to recognize PIC authority. Critical for safe operations.'},{category:'mission',question:'What authority does PIC have over missions?',answer:'Modify planned missions to provide for crew and airframe safety. Final responsibility for safe mission conduct. Can delay or cancel if conditions unsafe.'},{category:'mission',question:'What is PIC deviation authority?',answer:'May deviate from regulations only in response to inflight emergencies. Must report details to CG-711 within 24 hours if deviation occurs.'},{category:'mission',question:'What is Air Mission Commander (AMC) role?',answer:'Assigned for complex multi-aircraft missions or multiple sorties. Maintains mission consistency. Ensures crew compliance with mission plan. AMC has authority over aircraft and crews.'},{category:'mission',question:'What is AMC relationship to PIC authority?',answer:'Each aircraft PIC retains authority/responsibility for assigned aircraft. AMC coordinates overall mission. Both roles maintain their responsibilities but AMC oversees multi-aircraft coordination.'},{category:'mission',question:'What crew changeover authority exists?',answer:'PIC/AMC may transfer authority to qualified crewmember while airborne. Oncoming crewmember requires full brief before assuming duties. Avoid simultaneous multi-position transfers.'},{category:'auth',question:'What is PIC independence from rank/seniority?',answer:'PIC authority independent of rank/seniority in relation to other flight participants. Except: Commanding Officer retains command authority over PIC regarding tactical control.'},{category:'auth',question:'What happens if Commanding Officer assumes command?',answer:'Acting aviator in tactical command assumes PIC responsibility for flight. Any violations, mishaps, flight actions refer to that officer as PIC for remainder of flight.'},{category:'auth',question:'Can PIC authority be transferred?',answer:'Normally NOT transferred except emergency/military necessity. Only Commanding Officer or higher authority can authorize transfer. Initially assigned PIC retains authority for multi-flight operations.'},{category:'auth',question:'Does PIC relinquish control transfer responsibility?',answer:'No. Giving physical control to another pilot does NOT alter basic assignment of authority/responsibility. PIC maintains accountability regardless of who flies aircraft.'},{category:'auth',question:'What is clearance responsibility?',answer:'PIC obtains flight clearance from Commanding Officer. For scheduled flights via flight schedule. Non-scheduled flights require CO approval. Final responsibility for safe mission conduct rests with PIC.'},{category:'crew',question:'What is PIC responsibility for crew briefings?',answer:'Ensures crewmembers properly prepared for flight. Ensures crewmembers perform required equipment checks/inspections. Supervises flight planning and preparation activities.'},{category:'crew',question:'What passenger briefing information must PIC provide?',answer:'Flight itinerary, route, time, weather, altitude, cabin altitude. Inflight procedures, conveniences, flotation equipment, emergency signals. Ditching/crash actions, emergency equipment/exits, seatbelts, oxygen, smoking prohibition.'},{category:'crew',question:'What crew status documentation is required?',answer:'Status and crew position assignment of each individual must be clearly understood by entire aircrew before flight. Must be recorded on crew list/passenger manifest.'},{category:'crew',question:'What about senior crewmember in separate compartment?',answer:'Senior crewmember in separate compartment shall be clearly identified to other crewmembers in that compartment. Chain of command clarity essential.'},{category:'crew',question:'What are PIC preflight duties?',answer:'Supervise crew activity coordination. Plan mission analyzing purpose, weather, special instructions. Determine fuel, cargo, passenger loads. Ensure equipment checks. Check aircraft discrepancies.'},{category:'crew',question:'What aircraft documentation must PIC complete?',answer:'Obtain and complete CG Form 4377. Determine weight and center of gravity within limits. Ensure flight plan, itinerary, clearances prepared. Maintain mission log/folder.'},{category:'crew',question:'What operational area clearances must PIC obtain?',answer:'Aircraft clearances. Personnel clearances. Cargo clearances. Ensure passports, visas, inoculations, personnel records, orders, security clearances obtained.'},{category:'crew',question:'What crew documentation/uniform authority?',answer:'Prescribe crew uniform, flight clothing, ID cards, and tags. Maintain all required records. Ensure aircraft security. Direct and coordinate all crew activities throughout mission.'},{category:'crew',question:'What onscene authority does PIC have?',answer:'Acts as onscene commander when directed. Commands on-scene operations and decision-making. Final authority for tactical operations.'},{category:'mission',question:'What flight logs must PIC maintain?',answer:'Aircraft flight logs. Maintenance forms. Servicing records. Mission logs or folders. Ensure required periodic reports/messages sent. Ensure arrival/departure messages sent.'},{category:'mission',question:'What are flight delay procedures?',answer:'PIC/CO may delay mission if conditions unsafe. PIC final responsibility for safe conduct. If PIC refuses mission, not reassigned under same conditions without CO approval.'},{category:'mission',question:'What is PIC responsibility for malfunctioning aircraft?',answer:'Ensure proper inspection by competent maintenance if precautionary landing made. Report results to engineering officer. Further flight prohibited without approval.'},{category:'mission',question:'What flight rules apply?',answer:'Conduct in accordance with IFR whenever practical. Use radar advisory services fullest extent practical when operating VFR.'},{category:'mission',question:'What manifest requirements exist?',answer:'File accurate crew and passenger list with responsible person before flight. Show name, grade, service, duty station, status aboard. Retain for 7 years.'},{category:'mission',question:'What are PIC crew utilization limits per 24 hours?',answer:'Fixed-Wing Pressurized (HC-144): 12 individual flight hours, 16 crew mission hours. Avoid scheduling exceeding hourly limits. New 24-hour period begins after 10 hours rest.'},{category:'auth',question:'When can PIC divert to higher priority mission?',answer:'PIC authority to divert subject to limitations. Must ensure aircraft/crew fully capable of mission. Notify operations center as soon as practicable after diversion.'},{category:'auth',question:'What flight clearance limitations exist?',answer:'CO/PIC may not permit aircraft departure if safety unduly jeopardized. Cannot depart on VFR with preflight discrepancies unsafe for IFR. PIC final safety authority.'}];let currentIndex=0,filteredCards=[...flashcards],isFlipped=false;function displayCard(){isFlipped=false;const card=filteredCards[currentIndex];document.getElementById('cardLabel').textContent='Question';document.getElementById('cardContent').textContent=card.question;document.getElementById('card').classList.remove('flipped');document.getElementById('current').textContent=currentIndex+1;document.getElementById('total').textContent=filteredCards.length;updateProgress();updateButtons();}function flipCard(){if(isFlipped)displayCard();else{isFlipped=true;document.getElementById('cardLabel').textContent='Answer';document.getElementById('cardContent').textContent=filteredCards[currentIndex].answer;document.getElementById('card').classList.add('flipped');}}function nextCard(){if(currentIndex<filteredCards.length-1){currentIndex++;displayCard();}}function previousCard(){if(currentIndex>0){currentIndex--;displayCard();}}function filterCards(category){document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));if(category==='all'){filteredCards=[...flashcards];document.getElementById('allBtn').classList.add('active');}else if(category==='pref'){filteredCards=flashcards.filter(c=>c.category==='pref');document.getElementById('prefBtn').classList.add('active');}else if(category==='mission'){filteredCards=flashcards.filter(c=>c.category==='mission');document.getElementById('missionBtn').classList.add('active');}else if(category==='auth'){filteredCards=flashcards.filter(c=>c.category==='auth');document.getElementById('authBtn').classList.add('active');}else if(category==='crew'){filteredCards=flashcards.filter(c=>c.category==='crew');document.getElementById('crewBtn').classList.add('active');}currentIndex=0;displayCard();}function updateProgress(){document.getElementById('progress').style.width=((currentIndex+1)/filteredCards.length)*100+'%';}function updateButtons(){document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').disabled=currentIndex===filteredCards.length-1;}displayCard();</script></body></html>
