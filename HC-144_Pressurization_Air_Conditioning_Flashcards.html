<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>HC-144 Pressurization Flashcards</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);min-height:100vh;padding:20px;}.container{max-width:700px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);padding:30px;}.header{text-align:center;margin-bottom:30px;border-bottom:2px solid #f0f0f0;padding-bottom:20px;}.header h1{font-size:28px;color:#333;margin-bottom:8px;}.header p{color:#666;font-size:14px;}.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:25px;overflow:hidden;}.progress-fill{height:100%;background:#378ADD;transition:width 0.3s;}.controls{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;justify-content:center;align-items:center;}.controls button{padding:10px 16px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;}.controls button:hover{background:#f5f5f5;}.controls button.active{background:#378ADD;color:white;border-color:#378ADD;}.card{background:white;border:2px solid #e0e0e0;border-radius:12px;padding:40px;min-height:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;margin-bottom:25px;transition:all 0.3s;}.card:hover{border-color:#378ADD;box-shadow:0 4px 12px rgba(55,138,221,0.15);}.card.flipped{background:#f9f9f9;border-color:#378ADD;}.card-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-weight:600;}.card-content{font-size:16px;font-weight:500;color:#333;text-align:center;line-height:1.8;}.card.flipped .card-content{font-size:15px;font-weight:400;}.navigation{display:flex;gap:12px;justify-content:center;}.navigation button{padding:12px 24px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:0.2s;}.navigation button:disabled{opacity:0.4;}</style></head><body><div class="container"><div class="header"><h1>HC-144 Pressurization & Air Conditioning</h1><p>Complete Flashcard Study Deck - 36 Cards</p></div><div class="progress-bar"><div class="progress-fill" id="progress"></div></div><div class="controls"><button class="active" id="allBtn" onclick="filterCards('all')">All</button><button id="pressBtn" onclick="filterCards('press')">Pressurization</button><button id="acBtn" onclick="filterCards('ac')">Air Conditioning</button><button id="designBtn" onclick="filterCards('design')">Design/Operation</button><span style="font-size:13px;color:#666;font-weight:500;"><span id="current">1</span>/<span id="total">36</span></span></div><div class="card" id="card" onclick="flipCard()"><div class="card-label" id="cardLabel">Question</div><div class="card-content" id="cardContent"></div></div><div class="navigation"><button onclick="previousCard()" id="prevBtn">← Previous</button><button onclick="nextCard()" id="nextBtn">Next →</button></div></div><script>const flashcards=[{category:'press',question:'What is the purpose of aircraft pressurization system?',answer:'Maintains safe cabin atmospheric pressure and oxygen level at high altitudes where outside air is too thin and cold. Allows safe operation above 10,000 feet.'},{category:'press',question:'What is the maximum cabin pressure differential?',answer:'8.0 psi. Cabin does not exceed this pressure difference from outside air to limit structural stress on airframe and fuselage.'},{category:'press',question:'What cabin altitude is maintained at typical cruise?',answer:'Pressurized to approximately 8,000 feet cabin altitude even at 25,000+ feet actual altitude. Improves crew and passenger comfort on long flights.'},{category:'press',question:'How is cabin pressure controlled?',answer:'Automatic pressurization control system uses outflow valve and bleed air regulators. Throttles outflow of cabin air to maintain selected cabin altitude.'},{category:'press',question:'What are the pressurization control modes?',answer:'AUTOMATIC (system maintains selected cabin altitude automatically) and MANUAL (pilot manually controls outflow valve and bleed air).'},{category:'press',question:'What triggers pressurization warning lights?',answer:'CABIN ALT warning illuminates if cabin altitude exceeds 10,000 feet. PRESS DIFF warning if cabin pressure differential exceeds safe limits.'},{category:'press',question:'What bleed air sources feed pressurization system?',answer:'Engine bleed air from high-pressure compressor stages. Air is bled from each engine compressor and regulated for cabin pressurization.'},{category:'press',question:'What is the purpose of the pressure relief valve?',answer:'Protects cabin from overpressurization. Opens if pressure differential exceeds 8.0 psi between cabin and outside.'},{category:'design',question:'What are the primary bleed air system components?',answer:'Engine bleed air taps, isolation/check valves, APU bleed air capability, bleed air flow control, and pressure regulation for various aircraft systems.'},{category:'design',question:'What systems use bleed air?',answer:'Pressurization, Air conditioning, Anti-ice systems, Engine inlet anti-ice, Propeller anti-ice systems, and Pneumatic system actuation.'},{category:'ac',question:'What is the air conditioning system function?',answer:'Cools and dehumidifies cabin and cockpit air to maintain comfortable environment. Also provides cooling for various aircraft systems and components.'},{category:'ac',question:'How many air conditioning packs does HC-144 have?',answer:'Two independent air conditioning packs (No. 1 and No. 2), each serving different aircraft sections. Redundancy for system reliability.'},{category:'ac',question:'How do air conditioning packs work?',answer:'Bleed air from engines passes through turbine-driven heat exchangers. Turbine expansion cools air, controlled by mix valves for temperature regulation.'},{category:'ac',question:'What controls cabin temperature in air conditioning system?',answer:'Pilot-selected temperature knob controls trim air valve. Regulates mix of cooled air with bypass air to achieve desired cabin temperature.'},{category:'ac',question:'What is RAM air function in air conditioning?',answer:'Uses high-altitude ram air (dynamic pressure) for additional cooling. Improves cooling efficiency at altitude and high-speed flight.'},{category:'ac',question:'When is air conditioning system essential?',answer:'During ground operations to maintain crew comfort. In flight at altitude for crew workload reduction. Essential for mission system equipment cooling.'},{category:'press',question:'What happens if pressurization fails at altitude?',answer:'Cabin altitude warning illuminates when cabin exceeds 10,000 feet. Must descend to safe altitude immediately. Emergency descent procedures activated.'},{category:'press',question:'What is the alternate pressurization source?',answer:'APU bleed air can supply pressurization if engine bleed air unavailable. Allows continued pressurized flight for safe descent.'},{category:'press',question:'How is the outflow valve operated in manual mode?',answer:'Pilot manually controls outflow valve position. Reduces valve opening to increase cabin pressure, increases opening to decrease pressure.'},{category:'ac',question:'What is the purpose of engine bypass valve in AC system?',answer:'Prevents over-cooling of bleed air. Regulates air flow around turbine to maintain proper temperature before mix valve.'},{category:'press',question:'What is the maximum safe cabin altitude for continued flight?',answer:'10,000 feet. Above this altitude with pressurization failure, crew must use oxygen and begin descent. 30-minute time limit without supplemental oxygen.'},{category:'design',question:'How is bleed air isolated from engines?',answer:'Isolation valves prevent backflow from one engine to another. Check valves ensure one-way air flow. APU bleed air has dedicated isolation valve.'},{category:'design',question:'What pressure regulators control bleed air system?',answer:'Primary pressure regulator maintains engine bleed air at required pressure. Secondary regulator provides backup if primary fails.'},{category:'ac',question:'What temperature range is maintained in cabin?',answer:'Typically 68-75°F depending on crew preference. Pilot can adjust temperature within system limits using temperature control knob.'},{category:'ac',question:'Why is cabin humidity control important?',answer:'Prevents condensation on windows and instruments. Maintains comfortable environment for crew. Protects mission equipment from moisture damage.'},{category:'press',question:'What is cabin altitude rate of change limitation?',answer:'Pressurization system controlled to limit rate. Prevents rapid pressure changes that could cause ear/sinus discomfort or cabin door issues.'},{category:'press',question:'How does pressurization system handle rapid altitude changes?',answer:'Automatic control modulates outflow valve. During climb, cabin altitude lags behind actual altitude at controlled rate. During descent, cabin descends with aircraft.'},{category:'design',question:'What is the pneumatic system function?',answer:'Uses regulated bleed air pressure to actuate various systems including landing gear, flight control surfaces, and other actuators.'},{category:'ac',question:'What prevents AC packs from icing?',answer:'Anti-ice valves in turbine inlet. Bleeds hot air when ice detection system senses icing conditions in cooler stages.'},{category:'press',question:'What is the landing procedure for pressurization?',answer:'Automatic pressurization maintains cabin altitude during descent. Below 10,000 feet, cabin pressure equals outside air pressure naturally.'},{category:'design',question:'How are bleed air temperatures controlled?',answer:'Pressure regulators, heat exchangers, and bypass valves work together. Temperature sensors feedback to control valve positions automatically.'},{category:'ac',question:'What is air recirculation function?',answer:'Recirculation fans mix fresh bleed air with cabin air. Improves air distribution and reduces bleed air requirement while maintaining cabin conditions.'},{category:'press',question:'How do pilots monitor pressurization status?',answer:'Cabin altitude indicator shows actual cabin altitude. Pressure differential indicator shows cabin-to-outside pressure difference. Warning lights indicate system malfunctions.'},{category:'ac',question:'Can AC packs be shut off independently?',answer:'YES - each pack can be shutoff individually. Allows continued AC operation if one pack fails. System design prevents total loss of cooling.'},{category:'press',question:'What causes PRESS DIFF warning illumination?',answer:'Pressure differential exceeds 8.0 psi maximum design limit. Indicates overpressurization. Relief valve should open to prevent cabin damage.'},{category:'design',question:'What safety features protect pressurization system?',answer:'Pressure relief valves, shutoff valves, check valves, pressure limiters, and warning systems. Multiple redundancies prevent catastrophic failure.'},{category:'ac',question:'Is air conditioning available on ground?',answer:'YES - can use engine bleed air while engines running or APU bleed air. Essential for ground comfort and equipment cooling.'},{category:'press',question:'What is manual pressurization backup procedure?',answer:'If automatic system fails, pilot switches to manual mode. Manually operates outflow valve to maintain cabin altitude. Requires constant pilot attention.'}];let currentIndex=0,filteredCards=[...flashcards],isFlipped=false;function displayCard(){isFlipped=false;const card=filteredCards[currentIndex];document.getElementById('cardLabel').textContent='Question';document.getElementById('cardContent').textContent=card.question;document.getElementById('card').classList.remove('flipped');document.getElementById('current').textContent=currentIndex+1;document.getElementById('total').textContent=filteredCards.length;updateProgress();updateButtons();}function flipCard(){if(isFlipped)displayCard();else{isFlipped=true;document.getElementById('cardLabel').textContent='Answer';document.getElementById('cardContent').textContent=filteredCards[currentIndex].answer;document.getElementById('card').classList.add('flipped');}}function nextCard(){if(currentIndex<filteredCards.length-1){currentIndex++;displayCard();}}function previousCard(){if(currentIndex>0){currentIndex--;displayCard();}}function filterCards(category){document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));if(category==='all'){filteredCards=[...flashcards];document.getElementById('allBtn').classList.add('active');}else if(category==='press'){filteredCards=flashcards.filter(c=>c.category==='press');document.getElementById('pressBtn').classList.add('active');}else if(category==='ac'){filteredCards=flashcards.filter(c=>c.category==='ac');document.getElementById('acBtn').classList.add('active');}else if(category==='design'){filteredCards=flashcards.filter(c=>c.category==='design');document.getElementById('designBtn').classList.add('active');}currentIndex=0;displayCard();}function updateProgress(){document.getElementById('progress').style.width=((currentIndex+1)/filteredCards.length)*100+'%';}function updateButtons(){document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').disabled=currentIndex===filteredCards.length-1;}displayCard();</script></body></html>
