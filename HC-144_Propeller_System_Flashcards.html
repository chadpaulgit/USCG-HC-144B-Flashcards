<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>HC-144 Propeller System Flashcards</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);min-height:100vh;padding:20px;}.container{max-width:700px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);padding:30px;}.header{text-align:center;margin-bottom:30px;border-bottom:2px solid #f0f0f0;padding-bottom:20px;}.header h1{font-size:28px;color:#333;margin-bottom:8px;}.header p{color:#666;font-size:14px;}.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:25px;overflow:hidden;}.progress-fill{height:100%;background:#378ADD;transition:width 0.3s;}.controls{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;justify-content:center;align-items:center;}.controls button{padding:10px 16px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;}.controls button:hover{background:#f5f5f5;}.controls button.active{background:#378ADD;color:white;border-color:#378ADD;}.card{background:white;border:2px solid #e0e0e0;border-radius:12px;padding:40px;min-height:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;margin-bottom:25px;transition:all 0.3s;}.card:hover{border-color:#378ADD;box-shadow:0 4px 12px rgba(55,138,221,0.15);}.card.flipped{background:#f9f9f9;border-color:#378ADD;}.card-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-weight:600;}.card-content{font-size:16px;font-weight:500;color:#333;text-align:center;line-height:1.8;}.card.flipped .card-content{font-size:15px;font-weight:400;}.navigation{display:flex;gap:12px;justify-content:center;}.navigation button{padding:12px 24px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:0.2s;}.navigation button:disabled{opacity:0.4;}</style></head><body><div class="container"><div class="header"><h1>HC-144 Propeller System</h1><p>Complete Flashcard Study Deck - 32 Cards</p></div><div class="progress-bar"><div class="progress-fill" id="progress"></div></div><div class="controls"><button class="active" id="allBtn" onclick="filterCards('all')">All</button><button id="pitchBtn" onclick="filterCards('pitch')">Pitch Control</button><button id="brakBtn" onclick="filterCards('brak')">Propeller Brake</button><button id="deiceBtn" onclick="filterCards('deice')">Deicing</button><span style="font-size:13px;color:#666;font-weight:500;"><span id="current">1</span>/<span id="total">32</span></span></div><div class="card" id="card" onclick="flipCard()"><div class="card-label" id="cardLabel">Question</div><div class="card-content" id="cardContent"></div></div><div class="navigation"><button onclick="previousCard()" id="prevBtn">← Previous</button><button onclick="nextCard()" id="nextBtn">Next →</button></div></div><script>const flashcards=[{category:'pitch',question:'What are the two propeller pitch control modes?',answer:'MANUAL mode (manually positioned using power levers) and CONSTANT TORQUE mode (automatically maintains constant engine torque regardless of airspeed or altitude).'},{category:'pitch',question:'What is the pitch governor function?',answer:'Automatically adjusts propeller pitch to maintain constant engine torque during constant torque operation. Reduces pilot workload in varying flight conditions.'},{category:'pitch',question:'What does the Condition Lever (CL) control?',answer:'Engine fuel flow and propeller pitch. In FUEL OFF position, shuts down engine. In other positions, regulates fuel to engine.'},{category:'pitch',question:'What is propeller autofeather function?',answer:'Automatically positions propeller to high blade angle (feather) if engine fails or oil pressure drops below 40 psi. Reduces drag of failed engine.'},{category:'pitch',question:'When should autofeather be armed?',answer:'Before takeoff on all flights. Provides protection against engine failure. Must be manually disarmed on ground and after flight.'},{category:'brak',question:'What is propeller brake system function?',answer:'Hydraulically operated device that stops propeller rotation to allow engine No. 2 to act as APU (Auxiliary Power Unit) for power and air conditioning without propeller rotation hazard.'},{category:'brak',question:'What conditions must be met to engage propeller brake?',answer:'At least one hydraulic pump ON with 2,650+ psi, CL No. 2 in START, GUST LOCK engaged, aircraft on ground, PL No. 2 at GND IDLE.'},{category:'brak',question:'What happens when PROP BRK CONT pushtile is pressed?',answer:'PROP BRK warning annunciator and LOW PRESS IND lights illuminate. Brake engagement signals sent. BRAKE light in CONT pushtile illuminates when enough hydraulic pressure.'},{category:'brak',question:'How is propeller brake released?',answer:'Press CONT pushtile to release (ON light extinguished). Protection assembly returns hydraulic fluid and reduces brake pressure. PROP BRK remains on until pressure drops below 80 psi.'},{category:'brak',question:'What does low pressure in brake unit indicate?',answer:'Pressure below 2,350 psi in either brake line. PROP BRK warning annunciator and corresponding LOW PRESS IND light illuminate, indicating possible propeller rotation.'},{category:'brak',question:'What is the CRITICAL WARNING if engine fire occurs with brake engaged?',answer:'If fire detected while propeller brake engaged and fire handle pulled, brake automatically releases same way as pushtile release.'},{category:'brak',question:'Can propeller pitch advance occur with brake engaged?',answer:'YES - will cause brake overtemperature if NP increases without brake fully disengaged. Maintains brake pressure automatically if conditions met.'},{category:'deice',question:'How does propeller deicing system work?',answer:'Electric heating mats in propeller blade interior melt ice accumulation. Blades heat sequentially in two heating patterns. Timers sequence heating cycles.'},{category:'deice',question:'What are the two propeller deicing timer modes?',answer:'FAST mode: 10 seconds heat, 30-second rest between cycles. SLOW mode: 20 seconds heat with no rest between cycles.'},{category:'deice',question:'What is the propeller deice heating sequence?',answer:'Propeller 1 blades 2&4, Propeller 2 blades 1&3, Propeller 1 blades 1&3, Propeller 2 blades 2&4. Cycle repeats from where stopped.'},{category:'deice',question:'What protection does WOW microswitch provide?',answer:'Weight-on-wheels microswitch prevents propeller deicing on ground. GND OPR guarded pushtile allows manual ground operation when necessary.'},{category:'deice',question:'How can propeller deicing system be tested?',answer:'TEST switch on ICE PROTECTION panel displays current to system on ammeter. Indicates system integrity and operational status.'},{category:'pitch',question:'What is the UNSAFE TAKEOFF WARNING configuration?',answer:'Unsafe if propeller not fully feathered, flaps not takeoff position, elevator trim not in green band, or parking brake not released.'},{category:'pitch',question:'What minimum pitch blade angle is required during flight?',answer:'Propellers must maintain pitch angle above minimum safe descent rate threshold. Too high pitch angle can cause overspeed.'},{category:'pitch',question:'What indicates propeller malfunction on ground?',answer:'Excessive vibration, difficulty changing pitch, failure to respond to CL inputs, or abnormal oil pressure readings suggest propeller problems.'},{category:'pitch',question:'When should propeller pitch be checked before flight?',answer:'During preflight and before takeoff. Cycle through pitch range, verify smooth operation, confirm pitch indicator movement, check oil pressure response.'},{category:'brak',question:'Why can engine No. 2 act as APU when propeller brake engaged?',answer:'With propeller stopped, engine runs without hazardous propeller rotation. Bleed air and electrical power can be supplied to aircraft systems.'},{category:'deice',question:'Is propeller deicing automatic or manual?',answer:'Manual. Pilot must select deicing ON. Automatic timer sequencing controls which pair of blades heats and duration of heating cycles.'},{category:'deice',question:'What is the fuel system heating function in propeller deicing?',answer:'Propeller deicing uses electric heating only. Fuel system has separate heating (PGB oil heat exchanger) for preventing fuel gel in cold weather.'},{category:'pitch',question:'What does feathering the propeller accomplish?',answer:'Moves propeller blades to nearly edge-on flight position (90-degree blade angle). Minimizes drag if engine fails or shuts down.'},{category:'pitch',question:'What is the maximum propeller RPM limitation?',answer:'110% NG automatic protection via minimum pressure valve. Fuel shut-off occurs at 110% NG preventing overspeed.'},{category:'brak',question:'What is the maximum pressure available from propeller brake hydraulic source?',answer:'At least 2,650 psi required for engagement. Can accumulate up to 3,000 psi with multiple brake cycles. Monitored by pressure indicators.'},{category:'pitch',question:'Can propeller pitch be changed during autofeather engagement?',answer:'NO - during autofeather actuation, pitch automatically moves to feather. Manual control unavailable during feathering sequence.'},{category:'deice',question:'What ammeter reading indicates propeller deicing is operating?',answer:'Ammeter shows current draw when deicing active. Specific value depends on blade heating elements and number of blades heating.'},{category:'pitch',question:'What happens if constant torque mode is selected on climb?',answer:'Propeller governor automatically increases blade pitch angle to maintain constant torque as airspeed increases with altitude.'},{category:'brak',question:'How is hydraulic pressure maintained to propeller brake unit after initial engagement?',answer:'Protection assembly maintains pressure in brake unit automatically if all engagement conditions remain met. Prevents pressure loss from brake drift.'},{category:'pitch',question:'What is the pitch trim function?',answer:'Fine adjustment of blade pitch angle independent of CL position. Allows pilots to optimize propeller pitch for varying flight conditions.'},{category:'deice',question:'Can propeller deicing operate continuously in icing conditions?',answer:'YES - deicing cycles continuously while system armed and icing conditions present. Multiple cycles applied to maintain ice-free condition.'}];let currentIndex=0,filteredCards=[...flashcards],isFlipped=false;function displayCard(){isFlipped=false;const card=filteredCards[currentIndex];document.getElementById('cardLabel').textContent='Question';document.getElementById('cardContent').textContent=card.question;document.getElementById('card').classList.remove('flipped');document.getElementById('current').textContent=currentIndex+1;document.getElementById('total').textContent=filteredCards.length;updateProgress();updateButtons();}function flipCard(){if(isFlipped)displayCard();else{isFlipped=true;document.getElementById('cardLabel').textContent='Answer';document.getElementById('cardContent').textContent=filteredCards[currentIndex].answer;document.getElementById('card').classList.add('flipped');}}function nextCard(){if(currentIndex<filteredCards.length-1){currentIndex++;displayCard();}}function previousCard(){if(currentIndex>0){currentIndex--;displayCard();}}function filterCards(category){document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));if(category==='all'){filteredCards=[...flashcards];document.getElementById('allBtn').classList.add('active');}else if(category==='pitch'){filteredCards=flashcards.filter(c=>c.category==='pitch');document.getElementById('pitchBtn').classList.add('active');}else if(category==='brak'){filteredCards=flashcards.filter(c=>c.category==='brak');document.getElementById('brakBtn').classList.add('active');}else if(category==='deice'){filteredCards=flashcards.filter(c=>c.category==='deice');document.getElementById('deiceBtn').classList.add('active');}currentIndex=0;displayCard();}function updateProgress(){document.getElementById('progress').style.width=((currentIndex+1)/filteredCards.length)*100+'%';}function updateButtons(){document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').disabled=currentIndex===filteredCards.length-1;}displayCard();</script></body></html>
