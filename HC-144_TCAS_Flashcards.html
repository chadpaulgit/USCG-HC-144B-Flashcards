<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>HC-144 TCAS Flashcards</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);min-height:100vh;padding:20px;}.container{max-width:700px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);padding:30px;}.header{text-align:center;margin-bottom:30px;border-bottom:2px solid #f0f0f0;padding-bottom:20px;}.header h1{font-size:28px;color:#333;margin-bottom:8px;}.header p{color:#666;font-size:14px;}.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:25px;overflow:hidden;}.progress-fill{height:100%;background:#378ADD;transition:width 0.3s;}.controls{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;justify-content:center;align-items:center;}.controls button{padding:10px 16px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;}.controls button:hover{background:#f5f5f5;}.controls button.active{background:#378ADD;color:white;border-color:#378ADD;}.card{background:white;border:2px solid #e0e0e0;border-radius:12px;padding:40px;min-height:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;margin-bottom:25px;transition:all 0.3s;}.card:hover{border-color:#378ADD;box-shadow:0 4px 12px rgba(55,138,221,0.15);}.card.flipped{background:#f9f9f9;border-color:#378ADD;}.card-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-weight:600;}.card-content{font-size:16px;font-weight:500;color:#333;text-align:center;line-height:1.8;}.card.flipped .card-content{font-size:15px;font-weight:400;}.navigation{display:flex;gap:12px;justify-content:center;}.navigation button{padding:12px 24px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:0.2s;}.navigation button:disabled{opacity:0.4;cursor:not-allowed;}.footer{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid #f0f0f0;font-size:12px;color:#999;}</style></head><body><div class="container"><div class="header"><h1>HC-144 TCAS System</h1><p>Complete Flashcard Study Deck - 14 Cards</p></div><div class="progress-bar"><div class="progress-fill" id="progress"></div></div><div class="controls"><button class="active" id="allBtn" onclick="filterCards('all')">All</button><button id="systemBtn" onclick="filterCards('system')">System</button><button id="alertBtn" onclick="filterCards('alert')">Alerts</button><button id="operBtn" onclick="filterCards('oper')">Operations</button><span style="font-size:13px;color:#666;font-weight:500;"><span id="current">1</span>/<span id="total">14</span></span></div><div class="card" id="card" onclick="flipCard()"><div class="card-label" id="cardLabel">Question</div><div class="card-content" id="cardContent"></div></div><div class="navigation"><button onclick="previousCard()" id="prevBtn">← Previous</button><button onclick="nextCard()" id="nextBtn">Next →</button></div><div class="footer"><p>HC-144 Flight Manual (Dash 1) - CGTO 1C-144B-1</p></div></div><script>const flashcards=[{category:'system',question:'What is TCAS II system function?',answer:'Traffic Alert and Collision Avoidance System detects, tracks, and evaluates threat potential of nearby Mode A, S, C transponder-equipped aircraft to prevent mid-air collisions.'},{category:'system',question:'How many aircraft can TCAS track and display?',answer:'TCAS can track total of 150 transponder-equipped aircraft but will only display 30 highest threat targets. Maneuvers should not be based solely on TCAS position data accuracy.'},{category:'system',question:'What is TCAS surveillance envelope?',answer:'Extends 30 NM directly ahead of aircraft and 20 NM to each side and aft. Altitude tracking volumes (±2,700 ft normal, +9,900 ft/-2,700 ft above, +2,700 ft/-9,900 ft below).'},{category:'system',question:'What are altitude tracking volume modes?',answer:'Normal: ±2,700 ft. Above: +9,900 ft/-2,700 ft. Below: +2,700 ft/-9,900 ft. Selectable through CDU to display aircraft within specific altitude ranges.'},{category:'alert',question:'What is difference between TA and RA?',answer:'TA (Traffic Advisory): issued 20-48 seconds prior to CPA to alert pilot and increase time for visual acquisition. RA (Resolution Advisory): issued 15-35 seconds prior to CPA with mandatory vertical maneuvering guidance.'},{category:'alert',question:'What are three RA categories?',answer:'Preventative: "MONITOR VS", "CLIMB/DESCEND", "CROSSING CLIMB/DESCEND", "MAINTAIN VS". Corrective: "ADJUST VS", "INCREASE CLIMB/DESCENT". Revised: "CLIMB/DESCEND NOW", "CLEAR OF CONFLICT".'},{category:'alert',question:'What does "CLEAR OF CONFLICT" aural alert indicate?',answer:'No longer threat of collision with conflicting traffic. All previously issued RAs cancelled. Pilot may maneuver aircraft as required. Previous traffic continues tracked until outside threat envelope.'},{category:'alert',question:'What visual cues accompany TCAS RA?',answer:'Red and green lines displayed next to vertical speed tape on PFD. Red line indicates speeds to avoid (no-fly zone). Green line indicates recommended vertical speed for maneuver compliance.'},{category:'oper',question:'When is TCAS placed in TA ONLY mode?',answer:'When any EGPWS alerts are active, TCAS is placed in TA ONLY mode and all TCAS aural messages are inhibited to prevent conflicting alerts.'},{category:'oper',question:'What happens when TCAS failure occurs?',answer:'TCAS failure annunciation displayed on PFD. No traffic is displayed and no resolution advisories are given. Altitude tracking volumes cannot be selected.'},{category:'oper',question:'What TCAS modes exist for altitude tracking?',answer:'Three modes accessible through CDU: Normal (±2,700 ft), Above (+9,900 ft/-2,700 ft), Below (+2,700 ft/-9,900 ft) for altitude tracking volume configuration.'},{category:'system',question:'What aircraft types can TCAS track?',answer:'Aircraft equipped with Mode A, Mode S, or Mode C transponders. TCAS interrogates transponders and receives replies for tracking and threat assessment.'},{category:'oper',question:'What is RAIM alert in TCAS context?',answer:'Receiver Autonomous Integrity Monitoring system alert indicates GPS integrity problem. If conducting RNAV GPS approach, execute missed approach immediately. Check RAIM page on CDU.'},{category:'oper',question:'How should pilot respond to TCAS RA?',answer:'Comply with RA immediately by directing attention to RA displays and maneuvering as indicated, unless doing so would jeopardize safe operation or crew ensures separation with visual acquisition.'}];let currentIndex=0,filteredCards=[...flashcards],isFlipped=false;function displayCard(){isFlipped=false;const card=filteredCards[currentIndex];document.getElementById('cardLabel').textContent='Question';document.getElementById('cardContent').textContent=card.question;document.getElementById('card').classList.remove('flipped');document.getElementById('current').textContent=currentIndex+1;document.getElementById('total').textContent=filteredCards.length;updateProgress();updateButtons();}function flipCard(){if(isFlipped)displayCard();else{isFlipped=true;document.getElementById('cardLabel').textContent='Answer';document.getElementById('cardContent').textContent=filteredCards[currentIndex].answer;document.getElementById('card').classList.add('flipped');}}function nextCard(){if(currentIndex<filteredCards.length-1){currentIndex++;displayCard();}}function previousCard(){if(currentIndex>0){currentIndex--;displayCard();}}function filterCards(category){document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));if(category==='all'){filteredCards=[...flashcards];document.getElementById('allBtn').classList.add('active');}else if(category==='system'){filteredCards=flashcards.filter(c=>c.category==='system');document.getElementById('systemBtn').classList.add('active');}else if(category==='alert'){filteredCards=flashcards.filter(c=>c.category==='alert');document.getElementById('alertBtn').classList.add('active');}else if(category==='oper'){filteredCards=flashcards.filter(c=>c.category==='oper');document.getElementById('operBtn').classList.add('active');}currentIndex=0;displayCard();}function updateProgress(){document.getElementById('progress').style.width=((currentIndex+1)/filteredCards.length)*100+'%';}function updateButtons(){document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').disabled=currentIndex===filteredCards.length-1;}displayCard();</script></body></html>
