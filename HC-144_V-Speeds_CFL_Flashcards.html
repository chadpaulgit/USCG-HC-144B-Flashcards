<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>HC-144 V-Speeds & CFL Flashcards</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;background:linear-gradient(135deg,#f5f5f5,#e8e8e8);min-height:100vh;padding:20px;}.container{max-width:700px;margin:0 auto;background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.1);padding:30px;}.header{text-align:center;margin-bottom:30px;border-bottom:2px solid #f0f0f0;padding-bottom:20px;}.header h1{font-size:28px;color:#333;margin-bottom:8px;}.header p{color:#666;font-size:14px;}.progress-bar{height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:25px;overflow:hidden;}.progress-fill{height:100%;background:#378ADD;transition:width 0.3s;}.controls{display:flex;gap:12px;margin-bottom:25px;flex-wrap:wrap;justify-content:center;align-items:center;}.controls button{padding:10px 16px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;}.controls button:hover{background:#f5f5f5;}.controls button.active{background:#378ADD;color:white;border-color:#378ADD;}.card{background:white;border:2px solid #e0e0e0;border-radius:12px;padding:40px;min-height:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;margin-bottom:25px;transition:all 0.3s;}.card:hover{border-color:#378ADD;box-shadow:0 4px 12px rgba(55,138,221,0.15);}.card.flipped{background:#f9f9f9;border-color:#378ADD;}.card-label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-weight:600;}.card-content{font-size:16px;font-weight:500;color:#333;text-align:center;line-height:1.8;}.card.flipped .card-content{font-size:15px;font-weight:400;}.navigation{display:flex;gap:12px;justify-content:center;}.navigation button{padding:12px 24px;border:1px solid #ddd;background:white;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:0.2s;}.navigation button:disabled{opacity:0.4;cursor:not-allowed;}.footer{text-align:center;margin-top:30px;padding-top:20px;border-top:1px solid #f0f0f0;font-size:12px;color:#999;}</style></head><body><div class="container"><div class="header"><h1>HC-144 V-Speeds & CFL</h1><p>Performance Data Manual - 46 Cards</p></div><div class="progress-bar"><div class="progress-fill" id="progress"></div></div><div class="controls"><button class="active" id="allBtn" onclick="filterCards('all')">All</button><button id="takeoffBtn" onclick="filterCards('takeoff')">Takeoff V-Speeds</button><button id="landingBtn" onclick="filterCards('landing')">Landing V-Speeds</button><button id="cflBtn" onclick="filterCards('cfl')">CFL</button><button id="defBtn" onclick="filterCards('def')">Definitions</button><span style="font-size:13px;color:#666;font-weight:500;"><span id="current">1</span>/<span id="total">46</span></span></div><div class="card" id="card" onclick="flipCard()"><div class="card-label" id="cardLabel">Question</div><div class="card-content" id="cardContent"></div></div><div class="navigation"><button onclick="previousCard()" id="prevBtn">← Previous</button><button onclick="nextCard()" id="nextBtn">Next →</button></div><div class="footer"><p>HC-144 Performance Data Manual - CGTO 1C-144-1-1</p></div></div><script>const flashcards=[{category:'def',question:'What is Critical Field Length (CFL)?',answer:'Length of runway required to accelerate aircraft with all engines operating to critical engine failure speed (VCEF), experience engine failure, and continue to takeoff or stop within that distance. Most stringent limit on takeoff weight.'},{category:'def',question:'What is Takeoff Decision Speed (V1)?',answer:'Speed selected before takeoff where if engine failure occurs before this speed, takeoff should be aborted. If engine failure occurs at or after V1, takeoff should be continued. Pilot decision point during takeoff.'},{category:'def',question:'What is Rotation Speed (VR)?',answer:'Speed at which rotation from three-point attitude to takeoff attitude is initiated by applying back pressure to control column. Pilot rotates aircraft to achieve liftoff.'},{category:'def',question:'What is Liftoff Speed (VLOF)?',answer:'Speed at which main landing gear leaves ground. Aircraft becomes airborne. Occurs after rotation is initiated at VR.'},{category:'def',question:'What is Climbout Speed (V2)?',answer:'Speed recommended for obstacle clearance in continued takeoff after engine failure. Should be reached and maintained before aircraft reaches 35 ft height above runway.'},{category:'def',question:'What is Flap Retraction Speed?',answer:'Recommended speed for retracting flaps from takeoff to fully up position. Based on aircraft weight and configuration. Minimum recommended approximately VS1 where VS1 is zero thrust stall speed for flaps up.'},{category:'def',question:'What is Final Takeoff Climb Speed (VFTO)?',answer:'Speed recommended in continued takeoff after engine failure when flaps are in up position. For HC-144, VFTO = VS + 25 KIAS for flaps up.'},{category:'def',question:'What is Refusal Speed (VRE)?',answer:'Maximum speed to which aircraft can accelerate with takeoff power on both engines, suffer engine failure, stop within remaining available runway length with one engine inoperative at ground idle. Based on available runway.'},{category:'def',question:'What is Ground Minimum Control Speed (VMCG)?',answer:'Minimum speed during takeoff run at which failed engine can be handled with straight path maintained using only primary flight controls. Most critical engine failure point on ground.'},{category:'def',question:'What is Air Minimum Control Speed (VMCA)?',answer:'Minimum airborne speed at which failed engine can be handled with straight flight path maintained using maximum rudder deflection and no more than 5% aileron control or banking. Critical for single-engine go-around.'},{category:'def',question:'What is Maximum Braking Energy Speed (VMBE)?',answer:'Maximum speed at which aircraft can be brought to stop without exceeding maximum demonstrated braking energy.'},{category:'def',question:'What is Tyre Speed Limit (VTLS)?',answer:'Maximum tire speed rated for aircraft landing gear tires. HC-144 tire speed limit is 139 knots groundspeed. Aircraft takeoff speed not limited by tire speed.'},{category:'def',question:'What is Approach Speed (VAPP)?',answer:'Minimum recommended speed at which final approach phase should be performed. Minimum speed for stable descent to landing surface.'},{category:'def',question:'What is Threshold Speed (VTH)?',answer:'Aircraft speed at 50 ft above landing surface. Calculated as VREF + ΔVFLAP + ΔVICE + additional corrections for wind and single-engine operations.'},{category:'def',question:'What is Reference Speed (VREF)?',answer:'Minimum recommended threshold speed for landing with flaps landing configuration (23°). Defined as 1.3 VS for gross weight at flaps LNDG.'},{category:'def',question:'What is Touchdown Speed (VTD)?',answer:'Speed at which main landing gear touches ground. Equals approximately 1.24 VS or about 5 knots below VREF + ΔVFLAP. Should occur within first 1,500 ft of runway.'},{category:'takeoff',question:'What is the relationship between VMCG and VR?',answer:'VMCG must be lower than VR for safe takeoff operation. VR must be equal to or greater than VMCG and AS2 (2-second stall warning speed). Allows straight path on ground before rotation.'},{category:'takeoff',question:'How is VMCA calculated for HC-144?',answer:'Based on outside air temperature and pressure altitude. Enter graph with OAT, move vertically to pressure altitude curve, then horizontally to read VMCA on vertical scale. Accounts for aircraft weight at gross.'},{category:'takeoff',question:'What does VFTO = VS + 25 KIAS mean?',answer:'Final Takeoff Climb Speed equals zero thrust stall speed for flaps up configuration plus 25 knots IAS. Safety margin for single-engine climb performance after flaps retracted.'},{category:'takeoff',question:'When should flap retraction be initiated?',answer:'After positive rate of climb established and obstacle clearance achieved. Minimum recommended flap retraction speed approximately VS1 (zero thrust stall speed for flaps extended) to ensure adequate airspeed margin.'},{category:'takeoff',question:'What is the recommended V1 strategy for CFL?',answer:'V1 selected equal to VCEF (critical engine failure speed) when CFL is limiting factor. V1 should be as close to VR as practical to minimize critical time interval and improve safety margins.'},{category:'takeoff',question:'How does temperature affect VMCG?',answer:'Higher temperatures increase VMCG requirement. Enter air minimum control speed graph with actual OAT to determine VMCG at specific weight and pressure altitude.'},{category:'takeoff',question:'What is VS0 (stall speed in landing configuration)?',answer:'Zero thrust stall speed with landing gear down and flaps in landing position (23°). Used as reference for approach speeds and landing performance calculations.'},{category:'takeoff',question:'What is VS1 (stall speed in clean configuration)?',answer:'Zero thrust stall speed with landing gear retracted and flaps in up position. Used for flap retraction speed reference and minimum control speed calculations.'},{category:'landing',question:'What is the landing speed formula for VAPP?',answer:'VAPP = VTH + 5 KIAS. Minimum recommended approach speed for stable final descent with bank angles up to 15 degrees.'},{category:'landing',question:'What is the landing speed formula for VMAN?',answer:'VMAN = VTH + 10 KIAS. Maneuvering speed allows for bank angles up to 30 degrees if needed during final approach.'},{category:'landing',question:'How is VTH calculated with flap corrections?',answer:'VTH = VREF + ΔVFLAP + ΔVICE + additional corrections. Flaps APPR: add 5 KIAS. Flaps T/OFF: add 10 KIAS. Flaps UP: add 20 KIAS to base VREF.'},{category:'landing',question:'What ice correction is applied to VREF for landing?',answer:'Add 16 KIAS to VREF for all flap settings (LNDG, APPR, T/OFF) when ice accreted on aircraft. Add 18 KIAS for flaps UP configuration. Accounts for degraded aerodynamic performance.'},{category:'landing',question:'What is the wind correction formula for VTH?',answer:'Additional corrections = 1/2 steady-state wind + wind gust factor + 5 knots for single-engine. Maximum additional correction value is 15 knots. Applied to calculated VTH.'},{category:'landing',question:'What is the touchdown zone target for a normal landing?',answer:'Touchdown should occur at VTD within first 1,500 feet of runway. VTD equals 1.24 VS or approximately 5 knots below VREF + ΔVFLAP.'},{category:'landing',question:'When should landing with flaps less than APPR be considered?',answer:'When landing from instrument approach and runway length permits. Can avoid low altitude configuration changes. Consider using flaps APPR to maintain higher airspeed and safety margin.'},{category:'landing',question:'What bank angle limits apply to approach speeds?',answer:'VMAN allows bank angles up to 30 degrees. VTH allows bank angles up to 15 degrees. VTH is minimum safe approach speed for normal bank angles.'},{category:'landing',question:'What is maximum tire speed during landing?',answer:'Maximum tire speed is 139 knots groundspeed. Aircraft cannot touch down above this speed. Wind correction and descent rate affect groundspeed.'},{category:'landing',question:'How is go-around climb gradient affected by flaps?',answer:'Single-engine go-around uses flaps 15° (approach). Dual-engine go-around uses flaps 23° (landing). Gear extended for both. Climb gradient decreases with flaps extended.'},{category:'landing',question:'What single-engine go-around speed is used?',answer:'VREF + 5 KIAS for ice-free aircraft. VREF + 16 KIAS for ice accreted on aircraft. Balances obstacle clearance with single-engine climb performance.'},{category:'cfl',question:'What three elements define Critical Field Length?',answer:'1) Distance to accelerate with all engines to VCEF. 2) Engine failure experience at VCEF. 3) Continue to takeoff OR stop within available runway. All must occur within runway length.'},{category:'cfl',question:'When is CFL the limiting factor for takeoff weight?',answer:'When runway available, obstacle height, and single-engine climb performance all permit higher weights than CFL allows. CFL is most restrictive limit - determines Maximum Takeoff Weight.'},{category:'cfl',question:'How does runway condition reading (RCR) affect CFL?',answer:'Poor runway conditions increase distance required for takeoff/acceleration. RCR grid corrections applied. Wet/icy runway increases CFL distance requirement significantly.'},{category:'cfl',question:'What happens if available runway is less than required CFL?',answer:'Aircraft cannot operate from that runway safely with calculated weight. Reduce aircraft weight until CFL requirement matches or is less than available runway length.'},{category:'cfl',question:'How does temperature affect CFL calculation?',answer:'Higher temperatures reduce engine power and increase takeoff distance. Enter performance graph with ambient temperature. Pressure altitude and temperature combination critical.'},{category:'cfl',question:'What is the relationship between CFL and VMCG?',answer:'VMCG is used during CFL calculation to determine distance to critical engine failure point. CFL distance includes acceleration to VMCG, failure, and recovery distance.'},{category:'cfl',question:'How does aircraft gross weight affect CFL?',answer:'Higher gross weight increases required CFL distance. Weight curve on CFL performance chart shows increase in distance. CFL is primary limitation on payload/fuel capacity.'},{category:'cfl',question:'What is the minimum runway length requirement for stop-and-go landings?',answer:'Minimum 7,000 feet typical. Takeoff portion should not be initiated if runway remaining is less than CFL + 500 feet. Planned go/no-go point identified in approach brief.'},{category:'cfl',question:'How does pressure altitude affect takeoff performance and CFL?',answer:'Higher pressure altitude increases takeoff distance required. Enter performance graphs with pressure altitude of departure airfield. Higher altitude significantly increases CFL.'},{category:'takeoff',question:'What is minimum control speed on ground (VMCG) relationship to takeoff?',answer:'VMCG must be achievable and controllable during takeoff ground run. If engine fails below VMCG, aircraft can be controlled with primary controls. VR should exceed VMCG.'}];let currentIndex=0,filteredCards=[...flashcards],isFlipped=false;function displayCard(){isFlipped=false;const card=filteredCards[currentIndex];document.getElementById('cardLabel').textContent='Question';document.getElementById('cardContent').textContent=card.question;document.getElementById('card').classList.remove('flipped');document.getElementById('current').textContent=currentIndex+1;document.getElementById('total').textContent=filteredCards.length;updateProgress();updateButtons();}function flipCard(){if(isFlipped)displayCard();else{isFlipped=true;document.getElementById('cardLabel').textContent='Answer';document.getElementById('cardContent').textContent=filteredCards[currentIndex].answer;document.getElementById('card').classList.add('flipped');}}function nextCard(){if(currentIndex<filteredCards.length-1){currentIndex++;displayCard();}}function previousCard(){if(currentIndex>0){currentIndex--;displayCard();}}function filterCards(category){document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));if(category==='all'){filteredCards=[...flashcards];document.getElementById('allBtn').classList.add('active');}else if(category==='takeoff'){filteredCards=flashcards.filter(c=>c.category==='takeoff');document.getElementById('takeoffBtn').classList.add('active');}else if(category==='landing'){filteredCards=flashcards.filter(c=>c.category==='landing');document.getElementById('landingBtn').classList.add('active');}else if(category==='cfl'){filteredCards=flashcards.filter(c=>c.category==='cfl');document.getElementById('cflBtn').classList.add('active');}else if(category==='def'){filteredCards=flashcards.filter(c=>c.category==='def');document.getElementById('defBtn').classList.add('active');}currentIndex=0;displayCard();}function updateProgress(){document.getElementById('progress').style.width=((currentIndex+1)/filteredCards.length)*100+'%';}function updateButtons(){document.getElementById('prevBtn').disabled=currentIndex===0;document.getElementById('nextBtn').disabled=currentIndex===filteredCards.length-1;}displayCard();</script></body></html>
